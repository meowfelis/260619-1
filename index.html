      $("selectedTransitionChip").textContent = jp("transition_layer", selected.transition_layer) || "世界";
      $("transitionDetail").innerHTML = `
        <h3>${escapeHtml(selected.label || selected.id)}</h3>
        <p class="transition-lead"><strong>この変化の読み方</strong>${escapeHtml(transitionLeadOf(selected, snapshot, diff))}</p>
        <div class="transition-read-steps">
          ${transitionReadingStepsOf(selected).map((step) => `
            <article class="transition-read-step">
              <strong>${escapeHtml(step.label)}</strong>
              <span>${escapeHtml(step.value || "未記録")}</span>
            </article>
          `).join("")}
        </div>
        ${evidenceActionButtons(evidenceTurns)}
        <div class="inspector-grid">
          ${inspectorBlock("層", [
            `${jp("transition_layer", selected.transition_layer) || "世界"} / ${cascadeEventLabel(selected)} / ${jp("change_type", selected.change_type) || selected.change_type || "変化"} / ${jp("direction", selected.direction) || selected.direction || "未確定"}`,
            `モード: ${jp("transition_mode", transitionModeOf(selected)) || transitionModeOf(selected)}`,
            `対象: ${entityName(selected.subject)}`,
            `時点: T${selected.from_turn ?? "?"} -> T${selected.to_turn ?? "?"}`
          ])}
          ${inspectorBlock("前", [selected.from || "未記録"])}
          ${inspectorBlock("後", [selected.to || "未記録"])}
          ${inspectorBlock("読み取り", [selected.signal || "未記録"])}
          ${inspectorBlock("コード", (selected.codes || []).map((code) => jp("code", code)))}
          ${seciAnnotationBlock(selected)}
          ${sourceSpanBlock("証拠", evidenceRefs)}
          ${inspectorBlock("フィデリティ信号", fidelitySignals.map((signal) => `${jp("fidelity_kind", signal.kind) || signal.kind || "信号"} / ${jp("fidelity_polarity", signal.polarity) || signal.polarity || "未確定"}: ${signal.label || signal.finding || ""}`))}
          ${inspectorBlock(`選択中T${state.selectedTurn}の世界`, snapshotSummary(selectedTurnSnapshot))}
          ${inspectorBlock(`選択中T${state.selectedTurn}の差分`, diffSummary(selectedTurnDiff))}
          ${inspectorBlock("世界スナップショット", snapshotSummary(snapshot))}
          ${inspectorBlock("前後差分", diffSummary(diff))}
          ${inspectorBlock("前後snapshot比較", snapshotComparison)}
          ${snapshotSideBySideBlock(artifacts, diff)}
          ${inspectorBlock("差分の読み方", snapshotInterpretation)}
          ${snapshotDeltaCandidatesBlock(artifacts, diff)}
          ${sourceSpanBlock("差分根拠", diffEvidenceRefs)}
        </div>
        <div class="mechanism-flow">
          ${mechanism.map((step) => `
            <article class="mechanism-step">
              <strong>${escapeHtml(step.label)}</strong>
              <div class="body-text">${escapeHtml(step.value || "未記録")}</div>
            </article>
          `).join("")}
        </div>
        <div class="fidelity-signals">
          ${fidelitySignals.map((signal) => `
            <article class="fidelity-signal">
              <div class="chips">
                <span class="chip ${fidelitySignalClass(signal)}">${escapeHtml(jp("fidelity_kind", signal.kind) || signal.kind || "信号")}</span>
                <span class="chip">${escapeHtml(jp("fidelity_polarity", signal.polarity) || signal.polarity || "未確定")}</span>
              </div>
              <strong>${escapeHtml(signal.label || jp("fidelity_kind", signal.kind) || signal.kind || "信号")}</strong>
              <div class="body-text">${escapeHtml(signal.finding || "読み取りは未記録です。")}</div>
            </article>
          `).join("")}
        </div>
      `;
      bindTransitionEvidenceActions();
    }

    function transitionEvidenceTurnsOf(transition) {
      return [...new Set((transition?.evidence_turns || [])
        .map(Number)
        .filter((turn) => Number.isFinite(turn)))];
    }

    function evidenceActionButtons(turns) {
      if (!turns.length) return "";
      return `
        <div class="transition-evidence-actions">
          <strong>根拠へ戻る</strong>
          ${turns.map((turn) => `<button type="button" class="chip" data-transition-evidence-turn="${escapeHtml(turn)}">T${escapeHtml(turn)}</button>`).join("")}
        </div>
      `;
    }

    function bindTransitionEvidenceActions() {
      document.querySelectorAll("[data-transition-evidence-turn]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedTurn = Number(button.dataset.transitionEvidenceTurn);
          state.activeView = "reading";
          render();
        });
      });
      document.querySelectorAll("[data-source-span-turn]").forEach((button) => {
        button.addEventListener("click", () => {
          const turn = Number(button.dataset.sourceSpanTurn);
          if (Number.isFinite(turn) && turn > 0) state.selectedTurn = turn;
          state.sourceSpanHighlight = {
            turn,
            charStart: button.dataset.sourceSpanStart,
            charEnd: button.dataset.sourceSpanEnd
          };
          state.activeView = "reading";
          render();
          revealSourceSpanHighlight();
        });
      });
      document.querySelectorAll("[data-source-span-search]").forEach((input) => {
        input.addEventListener("change", () => {
          state.sourceSpanSearch = input.value || "";
          renderTabs(selectedArtifacts());
        });
      });
    }

    function revealSourceSpanHighlight() {
      requestAnimationFrame(() => {
        const highlight = document.querySelector(".source-highlight");
        if (highlight) {
          highlight.scrollIntoView({ block: "center", inline: "nearest", behavior: "smooth" });
        }
      });
    }

    function transitionCardNoteOf(transition) {
      const mode = transitionModeOf(transition);
      if (mode === "missed_precursor") return "読み口: 小さな予兆をどこで拾えなかったかを見る";
      if (mode === "aftercare_repair") return "読み口: 事後対処や関係修復がどう働いたかを見る";
      if (mode === "continuous_adjustment") return "読み口: 問題化する前の細かな再調整を見る";
      if (mode === "codebook_drift") return "読み口: 世界の変化に合わせた語彙更新を見る";
      if (mode === "preventive_process") return "読み口: 悪化を防ぐための予防的な動きを見る";
      return "読み口: 前後、根拠、評価信号をつないで読む";
    }

    function transitionLeadOf(transition, snapshot, diff) {
      const mode = transitionModeOf(transition);
      const modeLabel = jp("transition_mode", mode) || mode || "変化";
      const direction = jp("direction", transition?.direction) || transition?.direction || "向き未確定";
      const fromTo = `T${transition?.from_turn ?? "?"}からT${transition?.to_turn ?? "?"}`;
      const diffText = diff?.summary ? `差分としては「${diff.summary}」。` : "";
      if (mode === "missed_precursor") {
        return `${fromTo}で、拾われなかった予兆が悪化へつながった可能性を見る変化です。${diffText} 次は、どの小さな信号を早く観測できたかを確認します。`;
      }
      if (mode === "aftercare_repair") {
        return `${fromTo}で、事後対処や関係修復として支援が動いた場面です。${diffText} 修復後に条件や関係が持続するかが次の観測点です。`;
      }
      if (mode === "continuous_adjustment") {
        return `${fromTo}で、危機になる前から細かく再調整している場面です。${diffText} プロセス・フィデリティを読む中心的な変化です。`;
      }
      if (mode === "codebook_drift") {
        return `${fromTo}で、世界の変化に合わせて観測語彙やコードブック側も動いた場面です。${diffText} ものさし自体の更新として扱います。`;
      }
      return `${fromTo}の${modeLabel}です。方向は${direction}として読まれています。${diffText} 前後、証拠、フィデリティ信号を合わせて確認します。`;
    }

    function transitionReadingStepsOf(transition) {
      return [
        { label: "前", value: transition?.from },
        { label: "後", value: transition?.to },
        { label: "信号", value: transition?.signal || interpretationFallback(transition) },
        { label: "根拠", value: evidenceLabel(transition?.evidence_turns) || "証拠未記録" },
        { label: "次の問い", value: transitionNextQuestionOf(transition) }
      ];
    }

    function transitionNextQuestionOf(transition) {
      const mode = transitionModeOf(transition);
      if (mode === "missed_precursor") return "どの予兆を早く拾えたか。";
      if (mode === "aftercare_repair") return "修復後の条件は維持されているか。";
      if (mode === "continuous_adjustment") return "細かな再調整は誰に支えられているか。";
      if (mode === "codebook_drift") return "語彙の更新で何が見えるようになったか。";
      return "次の時点で同じ読みが保てるか。";
    }

    function mechanismOf(transition) {
      const m = transition?.mechanism || {};
      return [
        { label: "起点", value: m.from || transition?.from },
        { label: "きっかけ", value: m.trigger || evidenceLabel(transition?.evidence_turns) },
        { label: "検知", value: m.detection || transition?.signal },
        { label: "解釈", value: m.interpretation || interpretationFallback(transition) },
        { label: "対応", value: m.response || transition?.to },
        { label: "その後", value: m.after || transition?.to },
        { label: "定着", value: m.stabilization || stabilizationFallback(transition) }
      ];
    }

    function evidenceRefsOf(artifacts, transition) {
      const refs = transition?.evidence_refs || [];
      if (refs.length) return refs;
      const eventTransition = (artifacts.observabilityEvents || [])
        .map((event) => event.payload?.transition)
        .find((item) => item?.id === transition?.id);
      if (Array.isArray(eventTransition?.evidence_refs) && eventTransition.evidence_refs.length) return eventTransition.evidence_refs;
      return sourceRefsFromTurns(transition?.evidence_turns || []);
    }

    function sourceRefsFromTurns(turns, label = "turn") {
      return [...new Set((turns || []).map(Number).filter((turn) => Number.isFinite(turn) && turn > 0))].map((turn) => ({
        artifact_path: "episode.source.json",
        source_id: `${label}:${turn}`,
        source_span: `/messages/${Math.max(0, Number(turn || 1) - 1)}/text`,
        json_pointer: `/messages/${Math.max(0, Number(turn || 1) - 1)}/text`,
        turn,
        char_start: null,
        char_end: null,
        quote: ""
      }));
    }

    function snapshotDiffEvidenceRefsOf(artifacts, diff, transition) {
      const before = snapshotById(artifacts, diff?.from_snapshot_id);
      const after = snapshotById(artifacts, diff?.to_snapshot_id);
      const evidenceTurns = [
        ...(transition?.evidence_turns || []),
        ...(diff?.added_evidence_turns || []),
        ...(before?.evidence_turns || []),
        ...(after?.evidence_turns || [])
      ];
      return sourceRefsFromTurns(evidenceTurns, "diff-evidence");
    }

    function evidenceRefLabel(ref) {
      const artifact = ref.artifact_path || "artifact未記録";
      const sourceId = ref.source_id || (ref.turn ? `turn:${ref.turn}` : "source未記録");
      const span = ref.source_span || ref.json_pointer || "-";
      const range = ref.char_start !== undefined && ref.char_start !== null && ref.char_end !== undefined && ref.char_end !== null
        ? ` / chars ${ref.char_start}-${ref.char_end}`
        : "";
      const quote = ref.quote ? `: ${ref.quote}` : "";
      return `${sourceId} / ${artifact} / ${span}${range}${quote}`;
    }

    function sourceSpanBlock(title, refs) {
      const items = refs || [];
      const filteredItems = items.filter(sourceSpanMatchesSearch);
      const visibleItems = filteredItems.slice(0, 3);
      const hiddenItems = filteredItems.slice(3);
      const quoteItems = filteredItems.filter((ref) => String(ref.quote || "").trim()).slice(0, 4);
      return `
        <div class="inspector-block">
          <h4>${escapeHtml(title)}${items.length ? ` ${escapeHtml(filteredItems.length)}/${escapeHtml(items.length)}件` : ""}</h4>
          ${items.length ? `<input type="search" value="${escapeHtml(state.sourceSpanSearch)}" placeholder="証拠を検索" data-source-span-search>` : ""}
          <div class="mini-list">
            ${items.length ? (filteredItems.length ? visibleItems.map(sourceSpanButton).join("") : `<div>一致する証拠はありません。</div>`) : `<div>source span 未記録</div>`}
            ${hiddenItems.length ? `
              <details>
                <summary>残り ${escapeHtml(hiddenItems.length)}件</summary>
                <div class="mini-list">${hiddenItems.map(sourceSpanButton).join("")}</div>
              </details>
            ` : ""}
          </div>
          ${sourceSpanQuoteComparison(quoteItems)}
        </div>
      `;
    }

    function sourceSpanMatchesSearch(ref) {
      const query = String(state.sourceSpanSearch || "").trim().toLowerCase();
      if (!query) return true;
      return sourceSpanSearchText(ref).toLowerCase().includes(query);
    }

    function sourceSpanSearchText(ref) {
      return [
        sourceSpanTurn(ref) ? `T${sourceSpanTurn(ref)}` : "",
        ref?.artifact_path,
        ref?.source_id,
        ref?.source_span,
        ref?.json_pointer,
        ref?.quote,
        ref?.char_start,
        ref?.char_end
      ].filter((item) => item !== undefined && item !== null).join(" ");
    }

    function sourceSpanButton(ref) {
      return `<button type="button" class="${sourceSpanItemClass(ref)}" data-source-span-turn="${escapeHtml(sourceSpanTurn(ref) || "")}" data-source-span-start="${escapeHtml(ref.char_start ?? "")}" data-source-span-end="${escapeHtml(ref.char_end ?? "")}">${escapeHtml(evidenceRefLabel(ref))}</button>`;
    }

    function sourceSpanQuoteComparison(refs) {
      if (refs.length < 2) return "";
      return `
        <div class="source-quote-comparison">
          <strong>引用比較</strong>
          <div class="mini-list">
            ${refs.map(sourceSpanQuoteButton).join("")}
          </div>
        </div>
      `;
    }

    function sourceSpanQuoteButton(ref) {
      return `<button type="button" class="source-quote-button" data-source-span-turn="${escapeHtml(sourceSpanTurn(ref) || "")}" data-source-span-start="${escapeHtml(ref.char_start ?? "")}" data-source-span-end="${escapeHtml(ref.char_end ?? "")}"><strong>${escapeHtml(sourceSpanTurn(ref) ? `T${sourceSpanTurn(ref)}` : "T?")}</strong> ${escapeHtml(ref.quote || "")}</button>`;
    }

    function sourceSpanItemClass(ref) {
      const highlight = state.sourceSpanHighlight;
      const selected = highlight
        && String(highlight.turn) === String(sourceSpanTurn(ref) || "")
        && String(highlight.charStart ?? "") === String(ref.char_start ?? "")
        && String(highlight.charEnd ?? "") === String(ref.char_end ?? "");
      return `source-span-item${selected ? " selected" : ""}`;
    }

    function sourceSpanTurn(ref) {
      const explicit = Number(ref?.turn);
      if (Number.isFinite(explicit) && explicit > 0) return explicit;
      const sourceMatch = String(ref?.source_id || "").match(/turn:?(\d+)/i);
      if (sourceMatch) return Number(sourceMatch[1]);
      const pointerMatch = String(ref?.json_pointer || ref?.source_span || "").match(/messages\/(\d+)/);
      return pointerMatch ? Number(pointerMatch[1]) + 1 : "";
    }

    function evidenceLabel(turns) {
      const list = (turns || []).filter((turn) => turn !== undefined && turn !== null);
      return list.length ? `証拠: ${list.map((turn) => `T${turn}`).join(", ")}` : "";
    }

    function interpretationFallback(transition) {
      if (transition?.direction === "continuous_adjustment") return "事後対処ではなく、常時の微調整として読む。";
      if (transition?.direction === "repair") return "危機や負荷を契機に、関係や条件の修復として読む。";
      if (transition?.direction === "worsening") return "予兆が拾われず、悪化方向へ進んだものとして読む。";
      if (transition?.direction === "improving") return "観測語彙や支援条件が改善方向へ更新されたものとして読む。";
      return "変化の向きは保持し、追加証拠で解釈を更新する。";
    }

    function stabilizationFallback(transition) {
      if (transition?.direction === "continuous_adjustment") return "次の観測でも同じ調整が維持されるかを見る。";
      if (transition?.direction === "repair") return "修復後に再び扱える状態になったかを見る。";
      if (transition?.direction === "worsening") return "追加悪化を止め、見落とした予兆を再確認する。";
      if (transition?.direction === "improving") return "改善が語彙・制度・手順に残るかを見る。";
      return "次の時点で再観測し、定着条件を更新する。";
    }

    function fidelitySignalsOf(transition) {
      const explicit = transition?.fidelity_signals || [];
      if (explicit.length) return explicit;
      const signals = [];
      const codes = new Set([transition?.change_type, ...(transition?.codes || [])].filter(Boolean));
      if (codes.has("dynamic_fidelity")) {
        signals.push({ kind: "dynamic_fidelity", polarity: "unknown", label: "変化への追従", finding: "転機やズレに対してモデルが更新されたかを見る。" });
      }
      if (codes.has("process_fidelity")) {
        signals.push({ kind: "process_fidelity", polarity: "unknown", label: "常時調整", finding: "問題化する前から関係や支援条件を調整しているかを見る。" });
      }
      if (codes.has("relationship_repair") || transition?.direction === "repair") {
        signals.push({ kind: "repair_fidelity", polarity: "unknown", label: "関係修復", finding: "破綻や危機の後に関係や条件を立て直せるかを見る。" });
      }
      if (codes.has("observability_drop") || codes.has("silence_detection") || transition?.change_type === "observability_shift") {
        signals.push({ kind: "precursor_fidelity", polarity: transition?.direction === "worsening" ? "weak" : "unknown", label: "予兆", finding: "悪化前の小さな信号を拾えているかを見る。" });
      }
      return signals.length ? signals : [{ kind: "evidence_fidelity", polarity: "unknown", label: "根拠接続", finding: "どの証拠から変化を読んだかを見る。" }];
    }

    function transitionModeOf(transition) {
      if (transition?.transition_mode) return transition.transition_mode;
      if (transition?.direction === "worsening") return "missed_precursor";
      if (transition?.direction === "repair") return "aftercare_repair";
      if (transition?.direction === "continuous_adjustment") return "continuous_adjustment";
      if (transition?.direction === "stalled") return "stalled_transition";
      if (transition?.direction === "improving" && (transition?.transition_layer === "codebook" || transition?.change_type === "schema_transition")) return "schema_refinement";
      if (transition?.direction === "improving" && (transition?.codes || []).includes("work_passport_update")) return "preventive_process";
      if (transition?.direction === "improving" && transition?.change_type === "process_fidelity") return "preventive_process";
      if (transition?.direction === "improving") return "improving_transition";
      return "unclassified_transition";
    }

    function fidelitySignalClass(signal) {
      if (signal?.polarity === "strong") return "good";
      if (signal?.polarity === "emerging") return "info";
      if (signal?.polarity === "warning" || signal?.polarity === "weak") return "warn";
      if (signal?.kind === "codebook_fidelity" || signal?.kind === "observer_fidelity") return "violet";
      return "info";
    }

    function hasTurnEvidence(item, turn) {
      return (item?.evidence_turns || []).map(Number).includes(Number(turn));
    }

    function transitionsOf(artifacts) {
      return artifacts.transitions || artifacts.world?.transitions || [];
    }

    function snapshotsOf(artifacts) {
      return Array.isArray(artifacts.worldSnapshots)
        ? artifacts.worldSnapshots
        : (artifacts.world?.snapshots || artifacts.world_model_snapshots || []);
    }

    function worldDiffsOf(artifacts) {
      return Array.isArray(artifacts.worldDiffs)
        ? artifacts.worldDiffs
        : (artifacts.world?.diffs || artifacts.world_model_diffs || []);
    }

    function snapshotTurnFromId(snapshotId = "") {
      const match = String(snapshotId).match(/:t(\d+)$/);
      return match ? Number(match[1]) : NaN;
    }

    function snapshotForTransition(artifacts, transition) {
      const snapshots = snapshotsOf(artifacts);
      return snapshots.find((snapshot) => (snapshot.trigger_transition_ids || []).includes(transition?.id))
        || snapshots.find((snapshot) => Number(snapshot.turn) === Number(transition?.to_turn))
        || null;
    }

    function diffForTransition(artifacts, transition, snapshot) {
      const diffs = worldDiffsOf(artifacts);
      return diffs.find((diff) => (diff.transition_ids || []).includes(transition?.id))
        || diffs.find((diff) => snapshot && diff.to_snapshot_id === snapshot.snapshot_id)
        || null;
    }

    function snapshotForTurn(artifacts, turn) {
      return snapshotsOf(artifacts).find((snapshot) => Number(snapshot.turn) === Number(turn)) || null;
    }

    function snapshotById(artifacts, snapshotId) {
      if (!snapshotId) return null;
      return snapshotsOf(artifacts).find((snapshot) => snapshot.snapshot_id === snapshotId) || null;
    }

    function diffForTurn(artifacts, turn, snapshot) {
      return worldDiffsOf(artifacts).find((diff) => snapshot && diff.to_snapshot_id === snapshot.snapshot_id)
        || worldDiffsOf(artifacts).find((diff) => Number(snapshotTurnFromId(diff.to_snapshot_id)) === Number(turn))
        || null;
    }

    function snapshotSummary(snapshot) {
      if (!snapshot) return ["未接続"];
      return [
        `時点: T${snapshot.turn ?? "?"} / ${snapshot.phase || "phase未記録"}`,
        `要素: entity ${snapshot.entity_ids?.length || 0}, relation ${snapshot.relation_keys?.length || 0}, state ${snapshot.state_keys?.length || 0}`,
        `根拠: ${(snapshot.evidence_turns || []).map((turn) => `T${turn}`).join(", ") || "未記録"}`
      ];
    }

    function snapshotComparisonSummary(artifacts, diff) {
      if (!diff) return ["未接続"];
      const before = snapshotById(artifacts, diff.from_snapshot_id);
      const after = snapshotById(artifacts, diff.to_snapshot_id);
      if (!before && !after) return ["snapshot 未接続"];
      return [
        `時点: ${shortSnapshotId(diff.from_snapshot_id) || "?"} -> ${shortSnapshotId(diff.to_snapshot_id) || "?"}`,
        snapshotDeltaLine("entity", before?.entity_ids, after?.entity_ids),
        snapshotDeltaLine("relation", before?.relation_keys, after?.relation_keys),
        snapshotDeltaLine("state", before?.state_keys, after?.state_keys),
        snapshotDeltaLine("evidence", before?.evidence_turns, after?.evidence_turns)
      ];
    }

    function snapshotSideBySideBlock(artifacts, diff) {
      const html = snapshotSideBySideHtml(artifacts, diff);
      return html ? inspectorHtmlBlock("前後snapshot詳細", [html]) : "";
    }

    function snapshotInterpretationSummary(artifacts, diff) {
      if (!diff) return ["未接続"];
      const before = snapshotById(artifacts, diff.from_snapshot_id);
      const after = snapshotById(artifacts, diff.to_snapshot_id);
      if (!before && !after) return ["snapshot 未接続"];
      return [
        snapshotInterpretationLine("要素", before?.entity_ids, after?.entity_ids),
        snapshotInterpretationLine("関係", before?.relation_keys, after?.relation_keys),
        snapshotInterpretationLine("状態", before?.state_keys, after?.state_keys),
        snapshotInterpretationLine("根拠", before?.evidence_turns, after?.evidence_turns)
      ];
    }

    function snapshotInterpretationLine(label, beforeList = [], afterList = []) {
      const before = asStringList(beforeList);
      const after = asStringList(afterList);
      const added = listDifference(after, before);
      const removed = listDifference(before, after);
      if (added.length && removed.length) return `${label}: 置換・更新候補 / 追加 ${added.length} / 見えなくなった ${removed.length}`;
      if (added.length) return `${label}: 追加・拡張 / 追加 ${added.length}`;
      if (removed.length) return `${label}: 観測外れ候補 / 見えなくなった ${removed.length}`;
      return `${label}: 安定 / 件数 ${after.length}`;
    }

    function snapshotDeltaCandidatesBlock(artifacts, diff) {
      const allCandidates = snapshotDeltaCandidatesOf(artifacts, diff);
      const selectedCandidate = allCandidates.find((candidate) => deltaCandidateId(candidate) === state.selectedDeltaCandidateId);
      const initialCandidates = allCandidates.slice(0, 8);
      const candidates = selectedCandidate && !initialCandidates.some((candidate) => deltaCandidateId(candidate) === state.selectedDeltaCandidateId)
        ? [selectedCandidate, ...initialCandidates.slice(0, 7)]
        : initialCandidates;
      if (!allCandidates.length) return "";
      return inspectorHtmlBlock("差分候補", [`
        <div class="delta-candidate-list">
          <div class="body-text">表示 ${escapeHtml(candidates.length)} / ${escapeHtml(allCandidates.length)} 件</div>
          ${deltaCandidateLatestStateSummary(allCandidates)}
          ${selectedCandidate ? selectedDeltaCandidatePanel(selectedCandidate) : ""}
          ${candidates.map(deltaCandidateHtml).join("")}
          ${allCandidates.length > candidates.length ? `<div class="body-text">残り ${escapeHtml(allCandidates.length - candidates.length)} 件は、候補ごとの source span / quote 接続を増やしてから扱う。</div>` : ""}
        </div>
      `]);
    }

    function deltaCandidateLatestStateSummary(candidates) {
      const items = (candidates || [])
        .map((candidate) => {
          const candidateId = deltaCandidateId(candidate);
          const latestReview = latestDeltaReviewForCandidate(candidateId);
          if (!latestReview) return null;
          return { candidate, candidateId, latestReview };
        })
        .filter(Boolean)
        .sort((left, right) => deltaCandidateReviewPriority(left.latestReview) - deltaCandidateReviewPriority(right.latestReview))
        .slice(0, 6);
      if (!items.length) return "";
      return `
        <div class="mini-list">
          <strong>候補別の最新状態</strong>
          ${items.map(({ candidate, candidateId, latestReview }) => `
            <button type="button" class="code-item" data-review-candidate="${escapeHtml(candidateId)}">
              <span>${escapeHtml(latestReview.reviewStateLabel || latestReview.reviewState || "レビュー")}</span>
              <span class="hint">${escapeHtml(candidate.title || candidate.id || candidateId)}</span>
            </button>
          `).join("")}
        </div>
      `;
    }

    function deltaCandidateReviewPriority(review) {
      return deltaCandidateReviewStateDefinition(review)?.priority ?? 4;
    }

    function snapshotDeltaCandidatesOf(artifacts, diff) {
      if (!diff) return [];
      const before = snapshotById(artifacts, diff.from_snapshot_id);
      const after = snapshotById(artifacts, diff.to_snapshot_id);
      const context = {
        diffId: diff.diff_id || "",
        fromSnapshotId: diff.from_snapshot_id || "",
        toSnapshotId: diff.to_snapshot_id || ""
      };
      return [
        ...deltaCandidatesForType(artifacts, "entity", "要素", before?.entity_ids, after?.entity_ids, context),
        ...deltaCandidatesForType(artifacts, "relation", "関係", before?.relation_keys, after?.relation_keys, context),
        ...deltaCandidatesForType(artifacts, "state", "状態", before?.state_keys, after?.state_keys, context),
        ...deltaCandidatesForType(artifacts, "evidence", "根拠", before?.evidence_turns, after?.evidence_turns, context)
      ];
    }

    function allDeltaCandidatesOf(artifacts) {
      return worldDiffsOf(artifacts).flatMap((diff) => snapshotDeltaCandidatesOf(artifacts, diff));
    }

    function deltaCandidateByStableId(artifacts, candidateId) {
      return allDeltaCandidatesOf(artifacts).find((candidate) => deltaCandidateId(candidate) === candidateId);
    }

    function deltaCandidatesForType(artifacts, type, label, beforeList = [], afterList = [], context = {}) {
      const before = asStringList(beforeList);
      const after = asStringList(afterList);
      return [
        ...listDifference(after, before).map((id) => deltaCandidateDetail(artifacts, type, label, "added", id, context)),
        ...listDifference(before, after).map((id) => deltaCandidateDetail(artifacts, type, label, "removed", id, context))
      ];
    }

    function deltaCandidateDetail(artifacts, type, label, status, id, context = {}) {
      const world = artifacts.world || {};
      const entityById = new Map((world.entities || []).map((entity) => [entity.id, entity]));
      const relationByKey = new Map((world.relations || []).map((relation) => [relationKeyOf(relation), relation]));
      const stateByKey = new Map((world.states || []).map((item) => [stateKeyOf(item), item]));
      const base = { type, label, status, id, ...context };
      if (type === "entity") {
        const entity = entityById.get(id);
        return { ...base, title: entity?.label || id, evidenceTurns: entity?.evidence_turns || [] };
      }
      if (type === "relation") {
        const relation = relationByKey.get(id);
        const title = relation ? `${entityById.get(relation.source)?.label || relation.source} -> ${jp("predicate", relation.predicate)} -> ${entityById.get(relation.target)?.label || relation.target}` : id;
        return { ...base, title, evidenceTurns: relation?.evidence_turns || [] };
      }
      if (type === "state") {
        const stateItem = stateByKey.get(id);
        const title = stateItem ? `${entityById.get(stateItem.subject)?.label || stateItem.subject}: ${jp("code", stateItem.state_type)} = ${jp("value", stateItem.value)}` : id;
        return { ...base, title, evidenceTurns: stateItem?.evidence_turns || [] };
      }
      return { ...base, title: `T${id}`, evidenceTurns: [Number(id)].filter((turn) => Number.isFinite(turn)) };
    }

    function deltaCandidateHtml(candidate) {
      const statusLabel = candidate.status === "added" ? "追加・拡張" : "観測外れ候補";
      const evidence = (candidate.evidenceTurns || []).map(Number).filter((turn) => Number.isFinite(turn) && turn > 0);
      const candidateId = deltaCandidateId(candidate);
      const saveResult = state.deltaReviewSaveResults[candidateId];
      const latestReview = latestDeltaReviewForCandidate(candidateId);
      const reviewStateLabel = latestReview?.reviewStateLabel || deltaCandidateReviewState(candidate);
      return `
        <div class="delta-candidate ${escapeHtml(candidate.status)} ${candidateId === state.selectedDeltaCandidateId ? "selected" : ""}" data-delta-candidate="${escapeHtml(candidateId)}">
          <div><strong>${escapeHtml(candidate.label)} / ${escapeHtml(statusLabel)}</strong></div>
          <div class="delta-review-state">${escapeHtml(reviewStateLabel)}</div>
          <div class="body-text">${escapeHtml(candidate.title || candidate.id)}</div>
          <div class="body-text">${escapeHtml(deltaCandidateQuestion(candidate))}</div>
          <div class="chips">
            ${evidence.length ? evidence.map((turn) => `<button type="button" class="chip" data-transition-evidence-turn="${escapeHtml(turn)}">T${escapeHtml(turn)}</button>`).join("") : `<span class="chip">根拠未接続</span>`}
            ${latestReview ? `<span class="chip info">履歴あり</span>` : ""}
          </div>
          <details>
            <summary>保存イベント案</summary>
            <pre class="event-payload">${escapeHtml(JSON.stringify(deltaCandidateReviewEvent(candidate), null, 2))}</pre>
            <div class="chips">
              ${canSaveDeltaReviewEvents() ? `<button type="button" class="chip good" data-delta-review-save="${escapeHtml(candidateId)}">保存</button>` : `<span class="chip">サーバ配信時に保存</span>`}
              ${saveResult ? `<span class="chip ${saveResult.ok ? "good" : "warn"}">${escapeHtml(saveResult.label)}</span>` : ""}
            </div>
          </details>
        </div>
      `;
    }

    function selectedDeltaCandidatePanel(candidate) {
      const candidateId = deltaCandidateId(candidate);
      const history = state.savedDeltaReviewEvents.filter((event) => event.candidateId === candidateId);
      const evidence = deltaCandidateEvidenceTurns(candidate);
      const stateCounts = reviewStateCounts(history);
      const latestState = history[0]?.reviewState || deltaCandidateReviewStateKey(candidate);
      const stateActions = deltaCandidateAllowedReviewStates();
      return `
        <div class="delta-candidate selected">
          <div><strong>選択中候補</strong></div>
          <div class="mini-list">
            <div>候補ID: ${escapeHtml(candidateId)}</div>
            <div>種類: ${escapeHtml(candidate.label)} / ${escapeHtml(candidate.status === "added" ? "追加・拡張" : "観測外れ候補")}</div>
            <div>内容: ${escapeHtml(candidate.title || candidate.id)}</div>
            <div>問い: ${escapeHtml(deltaCandidateQuestion(candidate))}</div>
          </div>
          <div class="chips">
            ${evidence.length ? evidence.map((turn) => `<button type="button" class="chip" data-transition-evidence-turn="${escapeHtml(turn)}">T${escapeHtml(turn)}</button>`).join("") : `<span class="chip">根拠未接続</span>`}
            <span class="chip ${history.length ? "good" : "info"}">レビュー ${escapeHtml(history.length)}件</span>
            ${stateCounts.map(([label, count]) => `<span class="chip info">${escapeHtml(label)} ${escapeHtml(count)}件</span>`).join("")}
          </div>
          <div class="review-state-actions">
            <span class="hint">確認状態</span>
            ${stateActions.map((item) => `<button type="button" class="chip ${item.key === latestState ? "good" : ""}" data-delta-review-state="${escapeHtml(item.key)}" data-delta-review-save="${escapeHtml(candidateId)}">${escapeHtml(item.label)}</button>`).join("")}
          </div>
          <textarea class="review-note-input" rows="2" placeholder="判断理由メモ" data-delta-review-notes="${escapeHtml(candidateId)}">${escapeHtml(state.deltaReviewNotesDrafts[candidateId] || "")}</textarea>
          ${deltaReviewStateFlow(history)}
          ${history.length ? `<div class="mini-list">${history.slice(0, 3).map(deltaReviewHistoryRow).join("")}</div>` : `<div class="body-text">保存済みレビューはまだありません。</div>`}
          ${sourceSpanBlock("候補根拠", sourceRefsFromTurns(evidence, "delta-candidate"))}
        </div>
      `;
    }

    function deltaReviewStateFlow(history) {
      const labels = [...(history || [])]
        .reverse()
        .map((event) => event.reviewStateLabel || event.reviewState || "")
        .filter(Boolean);
      if (!labels.length) return "";
      const compact = labels.filter((label, index) => index === 0 || label !== labels[index - 1]);
      return `<div class="body-text"><strong>状態の流れ:</strong> ${compact.map(escapeHtml).join(" -> ")}</div>`;
    }

    function deltaReviewHistoryRow(event) {
      const note = event.reviewNotes ? `<div class="hint">理由: ${escapeHtml(event.reviewNotes)}</div>` : "";
      return `<div>${escapeHtml(event.ts || "時刻未記録")} / ${escapeHtml(event.reviewStateLabel || "レビュー")} / ${escapeHtml(event.summary || "レビュー")}${note}</div>`;
    }

    function reviewStateCounts(history) {
      const counts = new Map();
      for (const event of history || []) {
        const label = event.reviewStateLabel || event.reviewState || "レビュー";
        counts.set(label, (counts.get(label) || 0) + 1);
      }
      return [...counts.entries()];
    }

    function latestDeltaReviewForCandidate(candidateId) {
      return state.savedDeltaReviewEvents.find((event) => event.candidateId === candidateId) || null;
    }

    function canSaveDeltaReviewEvents() {
      return (window.location.protocol === "http:" || window.location.protocol === "https:")
        && window.location.pathname.startsWith("/workbench");
    }

    function canLoadDynamicCodingSeedsApi() {
      return (window.location.protocol === "http:" || window.location.protocol === "https:")
        && window.location.pathname.startsWith("/workbench");
    }

    async function loadDynamicCodingSeedRegistry() {
      if (!canLoadDynamicCodingSeedsApi() || state.dynamicCodingSeedApiLoaded) return;
      state.dynamicCodingSeedApiLoaded = true;
      try {
        const response = await fetch("/api/workbench/dynamic-coding/seeds");
        if (!response.ok) return;
        const payload = await response.json();
        const seeds = Array.isArray(payload.case_annotation_seeds)
          ? payload.case_annotation_seeds
          : [];
        if (!seeds.length) return;
        window.MEOWFELIS_DYNAMIC_CODING_SEEDS = seeds;
        window.MEOWFELIS_DYNAMIC_CODING_SEED_SOURCE =
          payload.source || "api_dynamic_coding_seed_registry";
        render();
      } catch (_error) {
        // Static hosts and older Meowfelis servers can keep using the embedded fallback.
      }
    }

    async function loadSavedDeltaReviewEvents() {
      if (!canSaveDeltaReviewEvents() || state.deltaReviewEventsLoaded) return;
      state.deltaReviewEventsLoaded = true;
      try {
        const response = await fetch("/api/observe/events?search=world_model.delta_candidate.review&limit=100");
        if (!response.ok) return;
        const page = await response.json();
        const nextResults = { ...state.deltaReviewSaveResults };
        const savedEvents = [];
        for (const item of page.items || []) {
          const preview = item?.payload?.payload?.event_preview || item?.payload?.event_preview || item?.payload;
          const candidateId = preview?.payload?.candidate_id;
          if (candidateId) {
            nextResults[candidateId] = { ok: true, label: "保存済み" };
            savedEvents.push(normalizeSavedDeltaReviewEvent(item, preview));
          }
        }
        state.deltaReviewSaveResults = nextResults;
        state.savedDeltaReviewEvents = savedEvents;
        render();
      } catch (_error) {
        // Static demo and non-Meowfelis hosts can ignore read-back failures.
      }
    }

    function normalizeSavedDeltaReviewEvent(item, preview) {
      const review = preview?.payload || {};
      const evidenceTurn = (review.evidence_turns || [])[0];
      const label = review.review_state_label || review.review_state || "レビュー";
      const title = review.title || review.candidate_label || review.candidate_id || "差分候補";
      return {
        id: item?.id || review.candidate_id || title,
        type: "world_model.delta_candidate.review",
        ts: item?.ts || "",
        turn: evidenceTurn || "",
        severity: "info",
        summary: `${label}: ${title}`,
        payload: item?.payload || preview,
        transitionId: "",
        candidateId: review.candidate_id || "",
        reviewState: review.review_state || "",
        reviewStateLabel: review.review_state_label || review.review_state || "",
        reviewNotes: review.review_notes || ""
      };
    }

    async function saveDeltaReviewCandidate(candidateId, overrides = {}) {
      const candidate = deltaCandidateByStableId(selectedArtifacts(), candidateId);
      if (!candidate) {
        state.deltaReviewSaveResults[candidateId] = { ok: false, label: "候補なし" };
        render();
        return;
      }
      state.deltaReviewSaveResults[candidateId] = { ok: true, label: "保存中" };
      render();
      try {
        const event = deltaCandidateReviewEvent(candidate, {
          review_notes: state.deltaReviewNotesDrafts[candidateId] || "",
          ...overrides
        });
        const response = await fetch("/api/sotopia/world-model/delta-reviews", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(event)
        });
        const result = await response.json().catch(() => ({}));
        if (response.ok && result.ok) {
          state.deltaReviewSaveResults[candidateId] = { ok: true, label: "保存済み" };
          state.savedDeltaReviewEvents = [normalizeSavedDeltaReviewEvent({ id: `local-${Date.now()}`, ts: "保存直後", payload: event }, event), ...state.savedDeltaReviewEvents];
        } else {
          state.deltaReviewSaveResults[candidateId] = { ok: false, label: "保存失敗" };
        }
      } catch (_error) {
        state.deltaReviewSaveResults[candidateId] = { ok: false, label: "保存失敗" };
      }
      render();
    }

    function deltaCandidateReviewState(candidate) {
      return deltaCandidateReviewStateLabel(candidate);
    }

    function deltaCandidateReviewStateKey(candidate) {
      if (!(candidate.evidenceTurns || []).length) return "evidence_pending";
      return "unreviewed";
    }

    function deltaCandidateReviewStateLabel(candidate) {
      if (!(candidate.evidenceTurns || []).length) return "根拠待ち";
      return "未確認";
    }

    function deltaCandidateReviewStateLabelFromKey(key) {
      const item = deltaCandidateAllowedReviewStates().find((stateItem) => stateItem.key === key);
      return item?.label || key || "レビュー";
    }

    function deltaCandidateReviewEvent(candidate, overrides = {}) {
      const reviewState = overrides.review_state || deltaCandidateReviewStateKey(candidate);
      const reviewStateLabel = overrides.review_state_label || deltaCandidateReviewStateLabelFromKey(reviewState);
      const reviewStateSchema = deltaCandidateReviewStateSchema();
      return {
        type: "world_model.delta_candidate.review",
        schema_version: "mvp3.delta_review.v0",
        payload: {
          candidate_id: deltaCandidateId(candidate),
          created_at_policy: "event_store_appended_at",
          review_actor_role: "researcher",
          diff_id: candidate.diffId || "",
          from_snapshot_id: candidate.fromSnapshotId || "",
          to_snapshot_id: candidate.toSnapshotId || "",
          candidate_type: candidate.type,
          candidate_label: candidate.label,
          candidate_status: candidate.status,
          review_state: reviewState,
          review_state_label: reviewStateLabel,
          review_state_schema_id: reviewStateSchema.schema_id,
          review_state_schema_ref: reviewStateSchema.schema_ref,
          review_state_seed_ref: reviewStateSchema.seed_ref,
          allowed_review_states: deltaCandidateAllowedReviewStates(),
          review_notes: overrides.review_notes || "",
          title: candidate.title || candidate.id,
          evidence_turns: deltaCandidateEvidenceTurns(candidate),
          review_basis: deltaCandidateReviewBasis(candidate),
          question: deltaCandidateQuestion(candidate)
        }
      };
    }

    function deltaCandidateEvidenceTurns(candidate) {
      return (candidate.evidenceTurns || []).map(Number).filter((turn) => Number.isFinite(turn) && turn > 0);
    }

    function deltaCandidateReviewBasis(candidate) {
      const evidenceTurns = deltaCandidateEvidenceTurns(candidate);
      return {
        basis_type: evidenceTurns.length ? "source_turns" : "missing_evidence",
        evidence_turns: evidenceTurns,
        needs_source_span: true
      };
    }

    function deltaCandidateAllowedReviewStates() {
      return deltaCandidateReviewStateDefinitions().map(({ key, label }) => ({ key, label }));
    }

    function deltaCandidateReviewStateSchema() {
      const seed = deltaCandidateReviewStateSeed();
      return {
        schema_id: seed.schema_id,
        schema_ref: seed.schema_ref,
        seed_ref: seed.seed_ref,
        source: seed.source,
        configurable_fields: seed.configurable_fields || []
      };
    }

    function deltaCandidateReviewStateSeed() {
      return {
        schema_id: "mvp3.delta_review_state.v0",
        schema_ref: "specs/mvp3_delta_review_state_schema.v0.json",
        seed_ref: "artifacts/mvp3_dynamic_coding_schema/review-state.v0.json",
        source: "embedded_demo_seed",
        configurable_fields: ["label", "priority", "action"],
        states: [
          { key: "needs_revisit", label: "要再検討", priority: 0, action: true, meaning: "解釈、コード化、根拠接続が不安定で、再度見る必要がある。" },
          { key: "evidence_pending", label: "根拠待ち", priority: 1, action: true, meaning: "source span、quote、turn単位の根拠が不足している。" },
          { key: "deferred", label: "保留", priority: 2, action: true, meaning: "後続文脈や関係者レビューまで意図的に開いたままにする。" },
          { key: "unreviewed", label: "未確認", priority: 3, action: false, meaning: "まだレビューされていない。" },
          { key: "confirmed", label: "確認済み", priority: 5, action: false, meaning: "現在のレビュー文脈では受け入れられた。" }
        ]
      };
    }

    function deltaCandidateReviewStateDefinitions() {
      return deltaCandidateReviewStateSeed().states || [];
    }

    function deltaCandidateReviewStateDefinition(reviewOrLabel) {
      const value = typeof reviewOrLabel === "string"
        ? reviewOrLabel
        : reviewOrLabel?.reviewStateLabel || reviewOrLabel?.reviewState || "";
      return deltaCandidateReviewStateDefinitions().find((item) => item.key === value || item.label === value) || null;
    }

    function deltaCandidateReviewStateLabelOf(event) {
      const review = observabilityReviewPayload(event);
      return event?.reviewStateLabel || review.review_state_label || review.review_state || "レビュー";
    }

    function deltaCandidateReviewStateIsActionable(label) {
      return Boolean(deltaCandidateReviewStateDefinition(label)?.action);
    }

    function deltaCandidateId(candidate) {
      return [
        candidate.diffId,
        candidate.fromSnapshotId,
        candidate.toSnapshotId,
        candidate.type,
        candidate.status,
        candidate.id
      ].map(deltaCandidateIdPart).filter(Boolean).join(":");
    }

    function deltaCandidateIdPart(part) {
      return String(part || "")
        .trim()
        .replace(/\s+/g, "_")
        .replace(/[^A-Za-z0-9_.:-]/g, "_");
    }

    function deltaCandidateQuestion(candidate) {
      if (candidate.status === "added") {
        if (candidate.type === "relation") return "新しい関係として本当に読めるか。既存関係の言い換えではないか。";
        if (candidate.type === "state") return "状態の変化として読めるか。一時的な観測ではないか。";
        if (candidate.type === "evidence") return "新しい根拠が、どの変化の意味づけを支えているか。";
        return "新しい要素として立てる必要があるか。既存要素の別名ではないか。";
      }
      if (candidate.type === "relation") return "関係が消えたのか、観測されなくなっただけか、別関係に置換されたのか。";
      if (candidate.type === "state") return "状態が解消したのか、表現が変わったのか、観測範囲から外れたのか。";
      if (candidate.type === "evidence") return "根拠が不要になったのか、後続の根拠に吸収されたのか。";
      return "要素が消えたのか、名前や役割が変わったのか、観測範囲から外れたのか。";
    }

    function snapshotSideBySideHtml(artifacts, diff) {
      if (!diff) return "";
      const before = snapshotById(artifacts, diff.from_snapshot_id);
      const after = snapshotById(artifacts, diff.to_snapshot_id);
      if (!before && !after) return "";
      return `
        <div class="snapshot-compare">
          ${snapshotColumnHtml("前", before, diff.from_snapshot_id)}
          ${snapshotColumnHtml("後", after, diff.to_snapshot_id)}
        </div>
      `;
    }

    function snapshotColumnHtml(label, snapshot, fallbackId) {
      if (!snapshot) {
        return `
          <div class="snapshot-column">
            <strong>${escapeHtml(label)} ${escapeHtml(shortSnapshotId(fallbackId) || "?")}</strong>
            <div class="body-text">snapshot 未接続</div>
          </div>
        `;
      }
      return `
        <div class="snapshot-column">
          <strong>${escapeHtml(label)} ${escapeHtml(shortSnapshotId(snapshot.snapshot_id) || `T${snapshot.turn ?? "?"}`)}</strong>
          <div class="body-text">phase: ${escapeHtml(snapshot.phase || "未記録")}</div>
          ${snapshotListHtml("entity", snapshot.entity_ids)}
          ${snapshotListHtml("relation", snapshot.relation_keys)}
          ${snapshotListHtml("state", snapshot.state_keys)}
          ${snapshotListHtml("evidence", (snapshot.evidence_turns || []).map((turn) => `T${turn}`))}
        </div>
      `;
    }

    function snapshotListHtml(label, items = []) {
      const values = asStringList(items);
      const shown = values.slice(0, 4);
      const rest = values.length - shown.length;
      return `
        <div>
          <div class="body-text">${escapeHtml(label)} ${values.length}</div>
          <div class="snapshot-list">
            ${shown.map((item) => `<span>${escapeHtml(item)}</span>`).join("")}
            ${rest > 0 ? `<span>他${escapeHtml(rest)}</span>` : ""}
          </div>
        </div>
      `;
    }

    function snapshotDeltaLine(label, beforeList = [], afterList = []) {
      const before = asStringList(beforeList);
      const after = asStringList(afterList);
      const added = listDifference(after, before);
      const removed = listDifference(before, after);
      return `${label}: ${before.length} -> ${after.length} / 追加 ${added.length}${previewIds(added)} / 見えなくなった ${removed.length}${previewIds(removed)}`;
    }

    function listDifference(primary = [], comparison = []) {
      const comparisonSet = new Set(asStringList(comparison));
      return asStringList(primary).filter((item) => !comparisonSet.has(item));
    }

    function asStringList(items = []) {
      return (items || []).map((item) => String(item)).filter(Boolean);
    }

    function previewIds(items = []) {
      if (!items.length) return "";
      const sample = items.slice(0, 3).join(", ");
      const suffix = items.length > 3 ? ` 他${items.length - 3}` : "";
      return ` (${sample}${suffix})`;
    }

    function diffSummary(diff) {
      if (!diff) return ["未接続"];
      return [
        diff.summary || diff.diff_id || "差分あり",
        `前後: ${shortSnapshotId(diff.from_snapshot_id) || "?"} -> ${shortSnapshotId(diff.to_snapshot_id) || "?"}`,
        `追加: entity ${diff.added_entity_ids?.length || 0}, relation ${diff.added_relation_keys?.length || 0}, state ${diff.added_state_keys?.length || 0}`,
        `追加: event ${diff.added_event_ids?.length || 0}, norm ${diff.added_norm_ids?.length || 0}, hypothesis ${diff.added_hypothesis_ids?.length || 0}, evidence ${diff.added_evidence_turns?.length || 0}`,
        `関連変化: ${(diff.transition_ids || []).join(", ") || "未記録"}`
      ];
    }

    function shortSnapshotId(id) {
      if (!id) return "";
      const text = String(id);
      const turn = snapshotTurnFromId(text);
      if (Number.isFinite(turn)) return `T${turn}`;
      return text.split(":").slice(-1)[0] || text;
    }

    function cascadeEventOf(transition) {
      if (transition?.cascade_event) return transition.cascade_event;
      if (transition?.transition_layer === "observer") return "ObserverShift";
      if (transition?.transition_layer === "evaluation" || transition?.change_type === "lens_transition") return "CriteriaShift";
      if (transition?.transition_layer === "codebook" || transition?.change_type === "schema_transition") return "CodebookEdit";
      if (transition?.transition_layer === "world") return "WorldModelRevise";
      return "Assert";
    }

    function cascadeEventLabel(transition) {
      const event = cascadeEventOf(transition);
      return jp("cascade_event", event) || event;
    }

    function transitionLayerClass(layer) {
      if (layer === "codebook") return "warn";
      if (layer === "evaluation") return "good";
      if (layer === "observer") return "info";
      return "";
    }

    function transitionDirectionClass(direction) {
      if (direction === "worsening") return "bad";
      if (direction === "repair" || direction === "improving") return "good";
      if (direction === "continuous_adjustment") return "info";
      return "warn";
    }

    function transitionModeClass(mode) {
      if (mode === "missed_precursor") return "bad";
      if (mode === "aftercare_repair" || mode === "preventive_process" || mode === "schema_refinement") return "good";
      if (mode === "continuous_adjustment") return "info";
      if (mode === "stalled_transition") return "warn";
      return "muted";
    }

    function selectedTurnBundle(artifacts) {
      const turn = Number(state.selectedTurn);
      const message = messagesOf(artifacts.episode).find((item, index) => Number(item.turn || index + 1) === turn);
      const coding = (artifacts.coding || []).find((item) => Number(item.turn) === turn);
      const world = artifacts.world || {};
      const relations = (world.relations || []).filter((item) => hasTurnEvidence(item, turn));
      const states = (world.states || []).filter((item) => hasTurnEvidence(item, turn));
      const norms = (world.norms || []).filter((item) => hasTurnEvidence(item, turn));
      const hypotheses = (world.hypotheses || []).filter((item) => hasTurnEvidence(item, turn));
      const events = (world.events || []).filter((item) => Number(item.turn) === turn);
      const transitions = transitionsOf(artifacts).filter((item) => hasTurnEvidence(item, turn) || Number(item.from_turn) === turn || Number(item.to_turn) === turn);
      const coverage = (artifacts.coverage || []).filter((item) => hasTurnEvidence(item, turn));
      const harness = artifacts.harness || {};
      const harnessSignals = (harness.ungentle_signals || []).filter((item) => {
        if (hasTurnEvidence(item, turn)) return true;
        const text = `${item.signal_id || ""} ${item.reason || ""}`;
        return text.includes(`turn_${turn}`) || text.includes(`T${turn}`) || text.includes(`turn ${turn}`);
      });
      return { turn, message, coding, relations, states, norms, hypotheses, events, transitions, coverage, harnessSignals };
    }

    function renderGraphInto(artifacts, graphId, detailsId) {
      const world = artifacts.world || {};
      const allEntities = world.entities || [];
      const allRelations = world.relations || [];
      const selected = selectedTurnBundle(artifacts);
      const selectedSnapshot = snapshotForTurn(artifacts, state.selectedTurn);
      const selectedDiff = diffForTurn(artifacts, state.selectedTurn, selectedSnapshot);
      const activeSnapshot = state.graphProjectionMode === "snapshot" ? selectedSnapshot : null;
      const snapshotEntityIds = new Set(activeSnapshot?.entity_ids || []);
      const snapshotRelationKeys = new Set(activeSnapshot?.relation_keys || []);
      const addedEntityIds = new Set(selectedDiff?.added_entity_ids || []);
      const addedRelationKeys = new Set(selectedDiff?.added_relation_keys || []);
      const addedStateKeys = new Set(selectedDiff?.added_state_keys || []);
      const beforeSnapshot = activeSnapshot && selectedDiff ? snapshotById(artifacts, selectedDiff.from_snapshot_id) : null;
      const removedEntityIds = new Set(listDifference(beforeSnapshot?.entity_ids, activeSnapshot?.entity_ids));
      const removedRelationKeys = new Set(listDifference(beforeSnapshot?.relation_keys, activeSnapshot?.relation_keys));
      const removedStateKeys = new Set(listDifference(beforeSnapshot?.state_keys, activeSnapshot?.state_keys));
      const visibleRelations = allRelations.filter((relation) => relationVisibleInSnapshot(relation, activeSnapshot, snapshotEntityIds, snapshotRelationKeys) || removedRelationKeys.has(relationKeyOf(relation)));
      const relationEntityIds = new Set(visibleRelations.flatMap((relation) => [relation.source, relation.target]));
      const entities = activeSnapshot && (snapshotEntityIds.size || removedEntityIds.size)
        ? allEntities.filter((entity) => snapshotEntityIds.has(entity.id) || relationEntityIds.has(entity.id) || removedEntityIds.has(entity.id))
        : allEntities;
      const relations = visibleRelations;
      const selectedEntityIds = new Set();
      selected.relations.forEach((relation) => {
        selectedEntityIds.add(relation.source);
        selectedEntityIds.add(relation.target);
      });
      selected.states.forEach((item) => selectedEntityIds.add(item.subject));
      selected.norms.forEach((item) => (item.applies_to || []).forEach((id) => selectedEntityIds.add(id)));
      selected.coverage.forEach((item) => (item.current_world_refs || []).forEach((id) => selectedEntityIds.add(id)));
      selected.coverage.forEach((item) => {
        entities
          .filter((entity) => entity.label === item.candidate_token || entity.id === item.candidate_token)
          .forEach((entity) => selectedEntityIds.add(entity.id));
      });
      const svg = $(graphId);
      if (!svg) return;
      const center = { x: 380, y: 176 };
      const radius = Math.min(230, 72 + entities.length * 28);
      const positions = new Map();
      entities.forEach((entity, index) => {
        const angle = (-Math.PI / 2) + (index * 2 * Math.PI / Math.max(entities.length, 1));
        positions.set(entity.id, {
          x: center.x + Math.cos(angle) * radius,
          y: center.y + Math.sin(angle) * Math.min(radius, 128)
        });
      });

      const relationLines = relations.map((relation) => {
        const source = positions.get(relation.source) || center;
        const target = positions.get(relation.target) || center;
        const selectedRelation = hasTurnEvidence(relation, state.selectedTurn);
        const addedRelation = addedRelationKeys.has(relationKeyOf(relation));
        const removedRelation = removedRelationKeys.has(relationKeyOf(relation));
        const relationStroke = removedRelation ? "#9ca3af" : addedRelation ? "#15803d" : selectedRelation ? "#2663eb" : "#7b8796";
        const relationWidth = addedRelation || selectedRelation || removedRelation ? "4" : "2";
        const relationMarker = removedRelation ? "arrowRemoved" : addedRelation ? "arrowAdded" : selectedRelation ? "arrowSelected" : "arrow";
        const dx = target.x - source.x;
        const dy = target.y - source.y;
        const length = Math.max(Math.sqrt(dx * dx + dy * dy), 1);
        const sourceRadius = 38;
        const targetRadius = selectedRelation || addedRelation || removedRelation ? 44 : 39;
        const x1 = source.x + (dx / length) * sourceRadius;
        const y1 = source.y + (dy / length) * sourceRadius;
        const x2 = target.x - (dx / length) * targetRadius;
        const y2 = target.y - (dy / length) * targetRadius;
        const labelX = (x1 + x2) / 2;
        const labelY = (y1 + y2) / 2 - 6;
        const relationLabel = `${removedRelation ? "見えなくなった: " : addedRelation ? "追加: " : ""}${jp("predicate", relation.predicate)}`;
        return `
          <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${relationStroke}" stroke-width="${relationWidth}" stroke-dasharray="${removedRelation ? "6 4" : ""}" marker-end="url(#${relationMarker})" />
          <text x="${labelX}" y="${labelY}" text-anchor="middle" font-size="11" fill="${removedRelation ? "#4b5563" : addedRelation ? "#14532d" : selectedRelation ? "#17202a" : "#3f4c5f"}">${escapeHtml(relationLabel)}</text>
        `;
      }).join("");

      const nodes = entities.map((entity) => {
        const pos = positions.get(entity.id);
        const addedNode = addedEntityIds.has(entity.id);
        const removedNode = removedEntityIds.has(entity.id);
        const fill = removedNode ? "#f3f4f6" : addedNode ? "#dcfce7" : entity.kind?.includes("candidate") ? "#fff3d8" : entity.kind?.includes("environment") ? "#e7f7f3" : "#e8efff";
        const stroke = removedNode ? "#9ca3af" : addedNode ? "#15803d" : entity.kind?.includes("candidate") ? "#a86500" : entity.kind?.includes("environment") ? "#087f8c" : "#2663eb";
        const selectedNode = selectedEntityIds.has(entity.id);
        const nodePrefix = removedNode ? "見えなくなった / " : addedNode ? "追加 / " : "";
        return `
          <g>
            <circle cx="${pos.x}" cy="${pos.y}" r="${selectedNode || addedNode || removedNode ? "39" : "34"}" fill="${fill}" stroke="${removedNode ? "#9ca3af" : addedNode ? "#15803d" : selectedNode ? "#17202a" : stroke}" stroke-width="${selectedNode || addedNode || removedNode ? "4" : "2"}" stroke-dasharray="${removedNode ? "6 4" : ""}" />
            <text x="${pos.x}" y="${pos.y - 2}" text-anchor="middle" font-size="13" font-weight="700" fill="#17202a">${escapeHtml(entity.label)}</text>
            <text x="${pos.x}" y="${pos.y + 15}" text-anchor="middle" font-size="10" fill="${removedNode ? "#4b5563" : addedNode ? "#14532d" : "#637083"}">${escapeHtml(`${nodePrefix}${jp("kind", entity.kind)}`)}</text>
          </g>
        `;
      }).join("");

      svg.innerHTML = `
        <defs>
          <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L8,4 L0,8 z" fill="#7b8796"></path>
          </marker>
          <marker id="arrowSelected" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L8,4 L0,8 z" fill="#2663eb"></path>
          </marker>
          <marker id="arrowAdded" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L8,4 L0,8 z" fill="#15803d"></path>
          </marker>
          <marker id="arrowRemoved" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L8,4 L0,8 z" fill="#9ca3af"></path>
          </marker>
        </defs>
        ${relationLines}
        ${nodes}
        ${entities.length ? "" : `<text x="380" y="180" text-anchor="middle" fill="#637083">表示できる関係グラフがありません</text>`}
      `;

      const details = $(detailsId);
      if (!details) return;
      const entityById = new Map((world.entities || []).map((entity) => [entity.id, entity.label]));
      const entityName = (id) => entityById.get(id) || id;
      details.innerHTML = [
        graphDetail(`T${state.selectedTurn}の世界`, snapshotSummary(selectedSnapshot), (item) => item),
        graphDetail(`T${state.selectedTurn}の差分`, diffSummary(selectedDiff), (item) => item),
        graphDetail("状態", (world.states || []).filter((item) => stateVisibleInSnapshot(item, activeSnapshot) || removedStateKeys.has(stateKeyOf(item))), (item) => `${removedStateKeys.has(stateKeyOf(item)) ? "見えなくなった: " : addedStateKeys.has(stateKeyOf(item)) ? "追加: " : ""}${entityName(item.subject)}: ${jp("code", item.state_type)} = ${jp("value", item.value)}`),
        graphDetail("規範", world.norms || [], (item) => item.label || item.id),
        graphDetail("仮説", world.hypotheses || [], (item) => item.statement || item.id)
      ].join("");
    }

    function relationKeyOf(relation) {
      return relation.key || relation.relation_key || `${relation.source}:${relation.predicate}:${relation.target}`;
    }

    function relationVisibleInSnapshot(relation, snapshot, snapshotEntityIds, snapshotRelationKeys) {
      if (!snapshot) return true;
      if (snapshotRelationKeys.size) return snapshotRelationKeys.has(relationKeyOf(relation));
      if (snapshotEntityIds.size) return snapshotEntityIds.has(relation.source) && snapshotEntityIds.has(relation.target);
      return true;
    }

    function stateKeyOf(state) {
      return state.key || state.state_key || `${state.subject}:${state.state_type}`;
    }

    function stateVisibleInSnapshot(state, snapshot) {
      if (!snapshot) return true;
      const stateKeys = new Set(snapshot.state_keys || []);
      if (stateKeys.size) return stateKeys.has(stateKeyOf(state));
      const entityIds = new Set(snapshot.entity_ids || []);
      return entityIds.size ? entityIds.has(state.subject) : true;
    }

    function renderGraphPanel(artifacts) {
      const hasSnapshot = !!snapshotForTurn(artifacts, state.selectedTurn);
      const modeLabel = state.graphProjectionMode === "snapshot" && hasSnapshot ? `T${state.selectedTurn}の世界` : "全体";
      return `
        <div class="transition-mode-summary">
          <button type="button" class="chip ${state.graphProjectionMode === "snapshot" && hasSnapshot ? "active" : ""}" data-graph-projection="snapshot" ${hasSnapshot ? "" : "disabled"}>時点</button>
          <button type="button" class="chip ${state.graphProjectionMode === "all" || !hasSnapshot ? "active" : ""}" data-graph-projection="all">全体</button>
          <div class="transition-mode-status">表示: ${escapeHtml(modeLabel)} の関係グラフ</div>
        </div>
        <div class="graph-wrap">
          <svg id="detailGraph" viewBox="0 0 760 360" role="img" aria-label="有向の関係グラフ"></svg>
          <div class="graph-details" id="detailGraphDetails"></div>
        </div>
      `;
    }

    function renderTurnInspector(artifacts) {
      const selected = selectedTurnBundle(artifacts);
      if (!selected.message) {
        $("turnInspector").innerHTML = `<div class="body-text">テキストを選ぶと、コード・関係グラフ・確認候補・働きかけがここに出ます。</div>`;
        return;
      }
      $("selectedTurnChip").textContent = `T${selected.turn}`;
      const codes = (selected.coding?.codes || []).map((code) => jp("code", code));
      const entityById = new Map((artifacts.world?.entities || []).map((entity) => [entity.id, entity.label]));
      const entityName = (id) => entityById.get(id) || id;
      const worldItems = [
        ...selected.events.map((item) => `出来事: ${item.summary || item.id}`),
        ...selected.relations.map((item) => `関係: ${entityName(item.source)} → ${jp("predicate", item.predicate)} → ${entityName(item.target)}`),
        ...selected.states.map((item) => `状態: ${entityName(item.subject)} / ${jp("state_type", item.state_type)} / ${jp("value", item.value)}`),
        ...selected.transitions.map((item) => `変化: T${item.from_turn} -> T${item.to_turn} ${item.label || item.id}`),
        ...selected.norms.map((item) => `規範: ${item.label || item.id}`),
        ...selected.hypotheses.map((item) => `仮説: ${item.statement || item.id}`)
      ];
      const coverageItems = selected.coverage.map((item) => `確認候補: ${item.candidate_token || item.signal_id}`);
      const harnessItems = selected.harnessSignals.map((item) => `${jp("severity", item.severity) || "注意"}: ${item.reason || item.signal_id}`);
      const hasSourceHighlight = state.sourceSpanHighlight && Number(state.sourceSpanHighlight.turn) === Number(selected.turn);
      const clearHighlightAction = hasSourceHighlight
        ? `<div class="chips"><button type="button" class="chip" data-clear-source-highlight>ハイライト解除</button></div>`
        : "";
      $("turnInspector").innerHTML = `
        <h3>T${selected.turn} の読み解き</h3>
        ${clearHighlightAction}
        <div class="inspector-grid">
          ${inspectorHtmlBlock("テキスト", [highlightedSourceTextHtml(argumentOf(selected.message), selected.turn)])}
          ${inspectorBlock("コード", codes.length ? codes : ["コードなし"])}
          ${inspectorBlock("関係グラフ", worldItems.length ? worldItems : ["直接の対応なし"])}
          ${inspectorBlock("確認候補・働きかけ", [...coverageItems, ...harnessItems].length ? [...coverageItems, ...harnessItems] : ["直接の信号なし"])}
        </div>
      `;
      bindClearSourceHighlightAction();
    }

    function bindClearSourceHighlightAction() {
      document.querySelectorAll("[data-clear-source-highlight]").forEach((button) => {
        button.addEventListener("click", () => {
          state.sourceSpanHighlight = null;
          render();
        });
      });
    }

    function inspectorBlock(title, items) {
      return `
        <div class="inspector-block">
          <h4>${escapeHtml(title)}</h4>
          <div class="mini-list">${items.map((item) => `<div>${escapeHtml(item)}</div>`).join("")}</div>
        </div>
      `;
    }

    function inspectorHtmlBlock(title, items) {
      return `
        <div class="inspector-block">
          <h4>${escapeHtml(title)}</h4>
          <div class="mini-list">${items.map((item) => `<div>${item}</div>`).join("")}</div>
        </div>
      `;
    }

    function highlightedSourceTextHtml(text, turn) {
      const highlight = state.sourceSpanHighlight;
      const body = String(text || "");
      if (!highlight || Number(highlight.turn) !== Number(turn)) return escapeHtml(body);
      const start = Number(highlight.charStart);
      const end = Number(highlight.charEnd);
      if (!Number.isFinite(start) || !Number.isFinite(end) || start < 0 || end <= start || start >= body.length) return escapeHtml(body);
      const safeEnd = Math.min(end, body.length);
      return `${escapeHtml(body.slice(0, start))}<mark class="source-highlight">${escapeHtml(body.slice(start, safeEnd))}</mark>${escapeHtml(body.slice(safeEnd))}`;
    }

    function graphDetail(title, items, renderItem) {
      return `
        <div class="detail-box">
          <h3>${escapeHtml(title)}</h3>
          <div class="mini-list">
            ${items.length ? items.map((item) => `<div>${escapeHtml(renderItem(item))}</div>`).join("") : `<div class="body-text">なし</div>`}
          </div>
        </div>
      `;
    }

    function renderTabs(artifacts) {
      $("tabs").innerHTML = tabs.map(([id, label]) => `
        <button type="button" class="tab ${id === state.activeTab ? "active" : ""}" data-tab="${id}">${escapeHtml(label)}</button>
      `).join("");
      document.querySelectorAll(".tab").forEach((button) => {
        button.addEventListener("click", () => {
          state.activeTab = button.dataset.tab;
          renderTabs(artifacts);
        });
      });

      const renderers = {
        graph: renderGraphPanel,
        transitions: renderTransitionPanel,
        lenses: renderLensPanel,
        harness: renderHarnessPanel,
        coverage: renderCoveragePanel,
        diff: renderDiffPanel,
        manifest: renderManifestPanel
      };
      $("tabPanel").innerHTML = (renderers[state.activeTab] || renderLensPanel)(artifacts);
      if (state.activeTab === "graph") {
        renderGraphInto(artifacts, "detailGraph", "detailGraphDetails");
      }
      bindPanelEvents();
    }

    function renderTransitionPanel(artifacts) {
      const transitions = transitionsOf(artifacts);
      const events = observabilityTimelineEvents(artifacts);
      const visibleEvents = events.filter(observabilityEventMatchesFilter);
      const selectedEvent = visibleEvents.find((event) => event.id === state.selectedObservabilityEventId) || visibleEvents[0] || null;
      if (selectedEvent) state.selectedObservabilityEventId = selectedEvent.id;
      const entityById = new Map((artifacts.world?.entities || []).map((entity) => [entity.id, entity.label]));
      const entityName = (id) => entityById.get(id) || id || "-";
      const eventPanel = events.length ? `
        <article class="card">
          <h3>観測タイムライン</h3>
          <div class="chips">
            ${observabilityEventFilterButtons(events)}
          </div>
          ${observabilityReviewStateSummary(events)}
          ${observabilityReviewActionHint(events)}
          <div class="mini-list">
            ${visibleEvents.length ? visibleEvents.slice(0, 12).map((event) => `
              <button type="button" class="timeline-item ${event.id === selectedEvent?.id ? "active" : ""}" data-observability-event="${escapeHtml(event.id || "")}" data-observability-turn="${escapeHtml(event.turn || "")}" data-observability-transition="${escapeHtml(event.transitionId || "")}">
                <span class="chip ${eventSeverityClass(event.severity)}">${escapeHtml(jp("severity", event.severity) || event.severity || "記録")}</span>
                <span class="chip">${escapeHtml(jp("event_type", event.type) || event.type || "event")}</span>
                <span>${escapeHtml(event.ts || event.turn ? event.ts || `T${event.turn}` : "時点未記録")}</span>
                <strong>${escapeHtml(event.summary || event.id || "観測イベント")}</strong>
              </button>
            `).join("") : `<div class="body-text">この条件の観測イベントはありません。</div>`}
          </div>
          ${observabilityEventDetail(selectedEvent)}
        </article>
      ` : "";
      return `<div class="panel-grid">${eventPanel}${transitions.length ? transitions.map((item) => `
        <article class="card">
          <h3>${escapeHtml(item.label || item.id)} <span class="chip info">T${escapeHtml(item.from_turn ?? "?")} -> T${escapeHtml(item.to_turn ?? "?")}</span></h3>
          <div class="chips">
            <span class="chip">${escapeHtml(jp("change_type", item.change_type) || item.change_type || "変化")}</span>
            <span class="chip ${item.direction === "worsening" ? "bad" : item.direction === "repair" || item.direction === "improving" ? "good" : "info"}">${escapeHtml(jp("direction", item.direction) || item.direction || "未確定")}</span>
            <span class="chip">${escapeHtml(entityName(item.subject))}</span>
          </div>
          <div class="mini-list">
            <div><strong>前</strong>: ${escapeHtml(item.from || "未記録")}</div>
            <div><strong>後</strong>: ${escapeHtml(item.to || "未記録")}</div>
            <div><strong>読み取り</strong>: ${escapeHtml(item.signal || "未記録")}</div>
          </div>
          <div class="chips">${(item.codes || []).map((code) => `<span class="chip ${codeChipClass(code)}">${escapeHtml(jp("code", code))}</span>`).join("")}</div>
        </article>
      `).join("") : `<div class="empty">表示できる変化はありません。</div>`}</div>`;
    }

    function observabilityTimelineEvents(artifacts) {
      const rawEvents = [
        ...(Array.isArray(artifacts.observabilityEvents) ? artifacts.observabilityEvents : []),
        ...state.savedDeltaReviewEvents
      ];
      const events = rawEvents.length
        ? rawEvents.map((event) => normalizeObservabilityEvent(event))
        : inferredObservabilityEvents(artifacts);
      return events.sort((a, b) => (a.turn || 0) - (b.turn || 0) || String(a.ts || "").localeCompare(String(b.ts || "")));
    }

    function observabilityEventFilterButtons(events) {
      const counts = {
        all: events.length,
        transition: events.filter((event) => event.type === "world_transition").length,
        signal: events.filter((event) => event.type === "transition_fidelity_signal").length,
        review: events.filter((event) => event.type === "world_model.delta_candidate.review").length,
        caution: events.filter((event) => eventSeverityClass(event.severity) === "warn").length
      };
      const labels = { all: "すべて", transition: "変化", signal: "信号", review: "レビュー", caution: "注意" };
      return Object.entries(labels)
        .map(([key, label]) => `<button type="button" class="chip ${state.observabilityEventFilter === key ? "active" : ""}" data-observability-filter="${escapeHtml(key)}">${escapeHtml(label)} ${escapeHtml(counts[key] || 0)}</button>`)
        .join("");
    }

    function observabilityReviewStateSummary(events) {
      const counts = new Map();
      for (const event of events || []) {
        if (event.type !== "world_model.delta_candidate.review") continue;
        const label = deltaCandidateReviewStateLabelOf(event);
        counts.set(label, (counts.get(label) || 0) + 1);
      }
      if (!counts.size) return "";
      return `
        <div class="chips">
          <button type="button" class="chip ${state.observabilityReviewStateFilter === "all" ? "active" : "info"}" data-observability-review-state="all">状態すべて ${escapeHtml([...counts.values()].reduce((sum, count) => sum + count, 0))}件</button>
          ${[...counts.entries()].map(([label, count]) => `<button type="button" class="chip ${state.observabilityReviewStateFilter === label ? "active" : "info"}" data-observability-review-state="${escapeHtml(label)}">${escapeHtml(label)} ${escapeHtml(count)}件</button>`).join("")}
        </div>
      `;
    }

    function observabilityReviewActionHint(events) {
      const todos = reviewTodoProjection(events);
      if (!todos.length) return "";
      const labels = [...new Set(todos.map((todo) => todo.stateLabel))];
      return `
        <div class="body-text">
          次に見る候補: ${escapeHtml(todos.length)}件
          ${labels.map((label) => `<button type="button" class="chip warn" data-observability-review-state="${escapeHtml(label)}">${escapeHtml(label)}</button>`).join("")}
        </div>
        ${reviewTodoListHtml(todos)}
      `;
    }

    function reviewTodoListHtml(todos) {
      const visibleTodos = (todos || []).slice(0, 3);
      if (!visibleTodos.length) return "";
      return `
        <div class="mini-list">
          ${visibleTodos.map((todo) => `
            <button type="button" class="code-item" data-review-candidate="${escapeHtml(todo.candidateId)}">
              <span>${escapeHtml(todo.stateLabel)}</span>
              <span class="hint">${escapeHtml(todo.summary)}</span>
            </button>
          `).join("")}
          ${todos.length > visibleTodos.length ? `<div class="hint">ほか ${escapeHtml(todos.length - visibleTodos.length)} 件</div>` : ""}
        </div>
      `;
    }

    function reviewTodoProjection(events) {
      return (events || [])
        .filter((event) => event.type === "world_model.delta_candidate.review")
        .map((event) => {
          const review = observabilityReviewPayload(event);
          const stateLabel = deltaCandidateReviewStateLabelOf(event);
          if (!deltaCandidateReviewStateIsActionable(stateLabel)) return null;
          return {
            id: event.id || review.candidate_id || "",
            candidateId: event.candidateId || review.candidate_id || "",
            stateLabel,
            summary: event.summary || review.title || review.candidate_label || review.candidate_id || "レビュー",
            turn: event.turn || (review.evidence_turns || [])[0] || "",
            ts: event.ts || ""
          };
        })
        .filter(Boolean)
        .sort((left, right) => {
          const priority = deltaCandidateReviewPriority({ reviewStateLabel: left.stateLabel }) - deltaCandidateReviewPriority({ reviewStateLabel: right.stateLabel });
          return priority || String(left.ts || "").localeCompare(String(right.ts || ""));
        });
    }

    function observabilityEventMatchesFilter(event) {
      let matchesType = true;
      if (state.observabilityEventFilter === "transition") matchesType = event.type === "world_transition";
      if (state.observabilityEventFilter === "signal") matchesType = event.type === "transition_fidelity_signal";
      if (state.observabilityEventFilter === "review") matchesType = event.type === "world_model.delta_candidate.review";
      if (state.observabilityEventFilter === "caution") matchesType = eventSeverityClass(event.severity) === "warn";
      if (!matchesType) return false;
      if (state.observabilityReviewStateFilter !== "all" && event.type === "world_model.delta_candidate.review") {
        return deltaCandidateReviewStateLabelOf(event) === state.observabilityReviewStateFilter;
      }
      return true;
    }

    function normalizeObservabilityEvent(event) {
      const type = event.type || event.event_type || "event";
      const transition = event.payload?.transition;
      const signal = event.payload?.signal;
      const turn = transition?.to_turn
        ?? signal?.evidence_turns?.[0]
        ?? Number(String(event.summary || "").match(/T(\d+)/)?.[1])
        ?? undefined;
      return {
        id: event.id || `${type}:${turn ?? "?"}:${event.ts || event.summary || ""}`,
        type,
        ts: event.ts,
        summary: event.summary,
        severity: event.severity,
        turn,
        transitionId: event.payload?.transition_id || transition?.id,
        payload: event.payload || {}
      };
    }

    function observabilityEventDetail(event) {
      if (!event) return "";
      const reviewSummary = observabilityReviewSummaryHtml(event);
      const reviewActions = observabilityReviewActionsHtml(event);
      return `
        <div class="inspector-block">
          <h4>選択中イベント</h4>
          <div class="mini-list">
            <div>種類: ${escapeHtml(jp("event_type", event.type) || event.type || "event")}</div>
            <div>時点: ${escapeHtml(event.ts || event.turn ? event.ts || `T${event.turn}` : "未記録")}</div>
            <div>関連変化: ${escapeHtml(event.transitionId || "未接続")}</div>
            <div>要約: ${escapeHtml(event.summary || event.id || "未記録")}</div>
          </div>
          ${reviewSummary}
          ${reviewActions}
          <details>
            <summary>payload を見る</summary>
            <input type="search" value="${escapeHtml(state.observabilityPayloadSearch)}" placeholder="payloadを検索" data-observability-payload-search>
            <pre class="event-payload">${escapeHtml(payloadPreview(event.payload, state.observabilityPayloadSearch))}</pre>
          </details>
          ${observabilityEventSourceSpanBlock(event)}
        </div>
      `;
    }

    function observabilityReviewSummaryHtml(event) {
      if (event?.type !== "world_model.delta_candidate.review") return "";
      const review = observabilityReviewPayload(event);
      const candidateId = event.candidateId || review.candidate_id || "";
      const reviewState = event.reviewStateLabel || review.review_state_label || review.review_state || "";
      const reviewNotes = event.reviewNotes || review.review_notes || "";
      return `
        <div class="mini-list">
          <div>候補ID: ${escapeHtml(candidateId || "未接続")}</div>
          <div>確認状態: ${escapeHtml(reviewState || "未記録")}</div>
          ${reviewNotes ? `<div>理由: ${escapeHtml(reviewNotes)}</div>` : ""}
        </div>
      `;
