    }

    function observabilityReviewActionsHtml(event) {
      if (event?.type !== "world_model.delta_candidate.review") return "";
      const review = observabilityReviewPayload(event);
      const candidateId = event.candidateId || review.candidate_id || "";
      const evidenceTurn = Number((review.evidence_turns || [event.turn])[0]);
      return `
        <div class="chips">
          ${candidateId ? `<button type="button" class="chip info" data-review-candidate="${escapeHtml(candidateId)}">候補を見る</button>` : ""}
          ${Number.isFinite(evidenceTurn) && evidenceTurn > 0 ? `<button type="button" class="chip" data-review-evidence-turn="${escapeHtml(evidenceTurn)}">T${escapeHtml(evidenceTurn)}</button>` : ""}
        </div>
      `;
    }

    function observabilityReviewPayload(event) {
      return event?.payload?.payload?.event_preview?.payload
        || event?.payload?.event_preview?.payload
        || event?.payload?.payload
        || {};
    }

    function observabilityEventSourceSpanBlock(event) {
      const refs = [
        ...(event?.payload?.transition?.evidence_refs || []),
        ...(event?.payload?.signal?.evidence_refs || [])
      ];
      return refs.length ? sourceSpanBlock("イベント証拠", refs) : "";
    }

    function payloadPreview(payload, query = "") {
      if (!payload || !Object.keys(payload).length) return "payload 未記録";
      const text = JSON.stringify(payload, null, 2);
      const needle = String(query || "").trim().toLowerCase();
      if (!needle) return text;
      const lines = text.split("\n").filter((line) => line.toLowerCase().includes(needle));
      return lines.length ? lines.join("\n") : "一致なし";
    }

    function inferredObservabilityEvents(artifacts) {
      return transitionsOf(artifacts).flatMap((transition) => {
        const transitionEvent = {
          id: `${transition.id}:world_transition`,
          type: "world_transition",
          ts: `T${transition.from_turn ?? "?"}->T${transition.to_turn ?? "?"}`,
          summary: transition.signal || transition.label || transition.id,
          severity: transition.direction === "worsening" ? "warn" : "info",
          turn: transition.to_turn || transition.from_turn,
          transitionId: transition.id
        };
        const signalEvents = fidelitySignalsOf(transition).map((signal, index) => ({
          id: `${transition.id}:signal:${index}`,
          type: "transition_fidelity_signal",
          ts: `T${signal.evidence_turns?.[0] ?? transition.to_turn ?? "?"}`,
          summary: `${signal.label || signal.kind || "信号"}: ${signal.finding || ""}`,
          severity: signal.polarity === "weak" || signal.polarity === "warning" ? "warn" : "info",
          turn: signal.evidence_turns?.[0] || transition.to_turn || transition.from_turn,
          transitionId: transition.id
        }));
        return [transitionEvent, ...signalEvents];
      });
    }

    function eventSeverityClass(severity) {
      if (severity === "error" || severity === "critical" || severity === "bad") return "bad";
      if (severity === "warn" || severity === "warning" || severity === "watch") return "warn";
      if (severity === "ok" || severity === "good") return "good";
      return "info";
    }

    function renderLensPanel(artifacts) {
      const lenses = artifacts.lenses || [];
      return `<div class="panel-grid">${lenses.length ? lenses.map((lens) => `
        <article class="card">
          <h3>${escapeHtml(jp("lens", lens.spec?.label) || lens.spec?.lens_id || "評価")}</h3>
          <div class="score-row"><span>${escapeHtml(jp("target", lens.spec?.target) || "対象")}</span><div class="bar"><span style="width:${Math.max(0, Math.min(100, Number(lens.score || 0) * 100))}%"></span></div><strong>${pct(lens.score)}</strong></div>
          <div class="body-text">${escapeHtml((lens.findings || []).join("\n"))}</div>
          ${(lens.spec?.known_biases || []).length ? `<div class="chips">${lens.spec.known_biases.map((bias) => `<span class="chip warn">${escapeHtml(bias)}</span>`).join("")}</div>` : ""}
        </article>
      `).join("") : `<div class="empty">表示できる評価結果がありません。</div>`}</div>`;
    }

    function renderHarnessPanel(artifacts) {
      const harness = artifacts.harness || {};
      const checks = harness.positive_checks || [];
      const signals = harness.ungentle_signals || [];
      if (artifacts.harnessMarkdown && !checks.length && !signals.length) {
        return `<article class="card"><h3>働きかけメモ</h3><div class="body-text">${escapeHtml(artifacts.harnessMarkdown)}</div></article>`;
      }
      return `
        <div class="panel-grid">
          <article class="card">
            <h3>よい作用</h3>
            <div class="score-row"><span>点数</span><div class="bar"><span style="width:${Math.max(0, Math.min(100, Number(harness.positive_score || 0) * 100))}%"></span></div><strong>${pct(harness.positive_score)}</strong></div>
            <div class="mini-list">${checks.length ? checks.map((check) => `<div><strong>${escapeHtml(check.label || check.check_id)}</strong>: ${escapeHtml(check.finding || "")} (${pct(check.score)})</div>`).join("") : "確認なし"}</div>
          </article>
          <article class="card">
            <h3>注意信号</h3>
            <div class="coverage-list">${signals.length ? signals.map((signal) => `<div class="card signal"><strong>${escapeHtml(jp("severity", signal.severity) || "注意")}</strong><div class="body-text">${escapeHtml(signal.reason || signal.signal_id)}</div></div>`).join("") : `<div class="body-text">なし</div>`}</div>
          </article>
        </div>
      `;
    }

    function renderCoveragePanel(artifacts) {
      const coverage = artifacts.coverage || [];
      return `<div class="coverage-list">${coverage.length ? coverage.map((signal) => {
        const reviewed = state.reviewedSignals.has(signal.signal_id);
        const kindLabel = jp("suspected_kind", signal.suspected_kind) || signal.suspected_kind || "確認候補";
        const actionLabel = jp("action", signal.recommended_action) || signal.recommended_action || "人が確認";
        return `
          <article class="card signal ${reviewed ? "reviewed" : ""}">
            <h3>${escapeHtml(signal.candidate_token || signal.signal_id)} <span class="chip warn">${escapeHtml(jp("severity", signal.severity) || "確認")}</span> <span class="chip">${escapeHtml(kindLabel)}</span></h3>
            <div class="body-text">${escapeHtml((signal.reason || []).join("\n"))}</div>
            <div class="chips">
              ${(signal.evidence_turns || []).map((turn) => `<span class="chip info">T${escapeHtml(turn)}</span>`).join("")}
              <span class="chip warn">${escapeHtml(actionLabel)}</span>
            </div>
            <label class="inline"><input type="checkbox" data-signal="${escapeHtml(signal.signal_id)}" ${reviewed ? "checked" : ""}> 確認済み</label>
          </article>
        `;
      }).join("") : `<div class="empty">確認候補はありません。</div>`}</div>`;
    }

    function renderDiffPanel(artifacts) {
      const diff = artifacts.diff || {};
      if (artifacts.diffMarkdown && !diff.agreements) {
        return `<article class="card"><h3>差分メモ</h3><div class="body-text">${escapeHtml(artifacts.diffMarkdown)}</div></article>`;
      }
      return `
        <div class="panel-grid">
          ${diffBlock("一致", diff.agreements)}
          ${diffBlock("違い", diff.disagreements)}
          ${diffBlock("次の問い", diff.follow_up_questions)}
        </div>
      `;
    }

    function diffBlock(title, items = []) {
      return `<article class="card"><h3>${escapeHtml(title)}</h3><div class="mini-list">${items.length ? items.map((item) => `<div>${escapeHtml(item)}</div>`).join("") : "なし"}</div></article>`;
    }

    function renderManifestPanel(artifacts) {
      const manifest = artifacts.manifest || {};
      const batch = state.batch || {};
      const outputs = manifestOutputs(manifest);
      const outputSummary = artifactOutputSummary(outputs);
      const configs = manifest.configs || {};
      const inputs = manifest.inputs || {};
      const provenance = manifest.provenance || {};
      const seedRegistry = dynamicCodingSeedRegistryStatus();
      return `
        <div class="panel-grid">
          <article class="card">
            <h3>実行記録</h3>
            <div class="mini-list">
              <div><strong>Run</strong>: ${escapeHtml(manifest.run_id || "未記録")}</div>
              <div><strong>Pipeline</strong>: ${escapeHtml([manifest.pipeline_name, manifest.pipeline_version].filter(Boolean).join(" / ") || "未記録")}</div>
              <div><strong>Created</strong>: ${escapeHtml(manifest.created_at || "未記録")}</div>
              <div><strong>Command</strong>: ${escapeHtml(provenance.command || "未記録")}</div>
            </div>
          </article>
          <article class="card">
            <h3>生成物</h3>
            <div class="chips">
              <span class="chip good">読込済み ${escapeHtml(outputSummary.loaded)}</span>
              <span class="chip warn">未読込 ${escapeHtml(outputSummary.missing)}</span>
              <span class="chip info">動的 ${escapeHtml(outputSummary.transition)}</span>
            </div>
            <div class="coverage-list">
              ${outputs.length ? outputs.map((item) => `
                <div class="card signal">
                  <strong>${escapeHtml(item.label)}</strong>
                  <div class="body-text">${escapeHtml(item.description)}</div>
                  <div class="body-text path-text">${escapeHtml(item.path)}</div>
                  <div class="chips">
                    <span class="chip ${item.loaded ? "good" : "warn"}">${escapeHtml(item.loaded ? "読込済み" : "未読込")}</span>
                    <span class="chip">${escapeHtml(item.kind)}</span>
                    <span class="chip info">${escapeHtml(item.viewLabel)}</span>
                  </div>
                  <div class="artifact-actions">
                    <button type="button" data-artifact-view="${escapeHtml(item.view)}" data-artifact-tab="${escapeHtml(item.tab)}" data-artifact-turn="${escapeHtml(item.targetTurn || "")}" data-artifact-transition="${escapeHtml(item.targetTransitionId || "")}" data-artifact-graph-projection="${escapeHtml(item.graphProjection || "")}" ${item.view === "" && item.tab === "" ? "disabled" : ""}>関連ビューへ</button>
                  </div>
                </div>
              `).join("") : `<div class="body-text">生成物の記録はありません。</div>`}
            </div>
          </article>
          <article class="card">
            <h3>動的スキーマ</h3>
            <div class="mini-list">
              <div><strong>Seed</strong>: ${escapeHtml(seedRegistry.seedCount)}件</div>
              <div><strong>Annotation</strong>: ${escapeHtml(seedRegistry.annotationCount)}件</div>
              <div><strong>Source</strong>: ${escapeHtml(seedRegistry.source)}</div>
              <div><strong>Fallback</strong>: ${escapeHtml(seedRegistry.fallbackMatch ? "一致" : "差分あり")} / ${escapeHtml(seedRegistry.fallbackSeedCount)} seed / ${escapeHtml(seedRegistry.fallbackAnnotationCount)} annotations</div>
              <div><strong>Diff</strong>: ${escapeHtml(seedRegistry.fallbackDiffLabel)}</div>
            </div>
          </article>
          <article class="card">
            <h3>設定</h3>
            <div class="mini-list">${Object.entries(configs).length ? Object.entries(configs).map(([key, value]) => `<div><strong>${escapeHtml(key)}</strong>: ${escapeHtml(value)}</div>`).join("") : "なし"}</div>
          </article>
          <article class="card">
            <h3>入力</h3>
            <div class="mini-list">${Object.entries(inputs).length ? Object.entries(inputs).map(([key, value]) => `<div><strong>${escapeHtml(key)}</strong>: ${escapeHtml(value || "未指定")}</div>`).join("") : "なし"}</div>
          </article>
          <article class="card"><h3>概要</h3><div class="body-text">${escapeHtml(JSON.stringify(batch.aggregate || batch, null, 2))}</div></article>
        </div>
      `;
    }

    function artifactOutputSummary(outputs) {
      return {
        loaded: outputs.filter((item) => item.loaded).length,
        missing: outputs.filter((item) => !item.loaded).length,
        transition: outputs.filter((item) => item.view === "transition").length
      };
    }

    function manifestOutputs(manifest) {
      const outputs = manifest.outputs || {};
      const labels = {
        episode_source_path: ["テキスト", "episode", "reading", "graph", "発言・出来事と根拠の流れを読む"],
        sim_events_jsonl_path: ["イベント", "event", "reading", "transitions", "観測イベントがどの時点に出たかを見る"],
        coding_observations_path: ["コード化", "codebook", "codebook", "", "コードごとの事例、関連概念、変化への接続を見る"],
        dialogue_state_path: ["対話状態", "state", "reading", "graph", "対話の状態を時点ごとの文脈として確認する"],
        world_model_path: ["ワールドモデル", "world", "reading", "graph", "現在の関係グラフと状態を読む"],
        world_model_snapshots_path: ["世界スナップショット", "snapshot", "transition", "", "時点ごとの世界モデルを切り替えて読む"],
        world_model_diff_path: ["前後差分", "diff", "transition", "", "何が追加・変化したかを変化の詳細で確認する"],
        world_transitions_path: ["トランジション", "transition", "transition", "", "出来事から世界・コード・評価がどう変わったかを読む"],
        observability_events_path: ["観測イベント", "event", "reading", "transitions", "信号がいつ出たかを観測タイムラインで追う"],
        coverage_signals_path: ["確認候補", "coverage", "reading", "coverage", "人間が確認すべき見落とし候補を処理する"],
        evaluation_lenses_path: ["評価レンズ", "evaluation", "reading", "lenses", "どの評価レンズで何を高く/低く見たかを読む"],
        harness_report_path: ["ハーネス", "harness", "reading", "harness", "働きかけの良い作用と注意信号を見る"],
        evaluation_diff_path: ["評価差分", "evaluation", "reading", "diff", "一致・違い・次の問いを読む"],
        reflection_path: ["ふりかえり", "reflection", "reading", "diff", "次のコードブック更新や研究問いを拾う"],
        next_codebook_tasks_path: ["コードブック課題", "task", "codebook", "", "理論レンズやコードブックの次タスクを見る"],
        kioku_graph_path: ["関係グラフ保存先", "graph", "reading", "graph", "投影された関係グラフの入口を確認する"]
      };
      const entries = Object.entries(outputs).filter(([, path]) => path);
      const source = entries.length ? entries : inferredManifestOutputs();
      return source.map(([key, path]) => {
          const [label, kind, view = "reading", tab = "manifest", description = "生成物の意味を確認し、関連ビューで読みます。"] = labels[key] || [key, "artifact", "reading", "manifest", "生成物の意味を確認し、関連ビューで読みます。"];
          const viewLabel = view === "transition" ? "動的モデリング" : view === "codebook" ? "コードブック" : "読解";
          return { key, label, kind, path, loaded: artifactLoadedForOutput(key), view, tab, viewLabel, description, ...artifactNavigationTarget(key) };
        });
    }

    function artifactNavigationTarget(key) {
      const artifacts = selectedArtifacts();
      if (key === "world_model_snapshots_path") {
        const snapshot = snapshotForTurn(artifacts, state.selectedTurn) || snapshotsOf(artifacts)[0];
        return { targetTurn: snapshot?.turn, graphProjection: "snapshot" };
      }
      if (key === "world_model_diff_path") {
        const snapshot = snapshotForTurn(artifacts, state.selectedTurn) || snapshotsOf(artifacts)[0];
        const diff = diffForTurn(artifacts, snapshot?.turn ?? state.selectedTurn, snapshot) || worldDiffsOf(artifacts)[0];
        return { targetTurn: snapshot?.turn ?? snapshotTurnFromId(diff?.to_snapshot_id), graphProjection: "snapshot" };
      }
      if (key === "world_transitions_path") {
        const transition = transitionsOf(artifacts).find((item) => Number(item.to_turn) === Number(state.selectedTurn)) || transitionsOf(artifacts)[0];
        return { targetTurn: transition?.to_turn, targetTransitionId: transition?.id };
      }
      if (key === "observability_events_path") {
        const event = observabilityTimelineEvents(artifacts)[0];
        return { targetTurn: event?.turn, targetTransitionId: event?.transitionId };
      }
      return {};
    }

    function inferredManifestOutputs() {
      const artifacts = selectedArtifacts();
      const entries = [];
      const add = (key, present) => { if (present) entries.push([key, "読み込み済み artifact"]); };
      add("episode_source_path", !!artifacts.episode);
      add("coding_observations_path", (artifacts.coding || []).length > 0);
      add("world_model_path", !!artifacts.world);
      add("world_model_snapshots_path", snapshotsOf(artifacts).length > 0);
      add("world_model_diff_path", worldDiffsOf(artifacts).length > 0);
      add("world_transitions_path", transitionsOf(artifacts).length > 0);
      add("observability_events_path", (artifacts.observabilityEvents || []).length > 0);
      add("coverage_signals_path", (artifacts.coverage || []).length > 0);
      add("evaluation_lenses_path", (artifacts.lenses || []).length > 0);
      add("harness_report_path", !!artifacts.harnessMarkdown || !!artifacts.harness);
      add("evaluation_diff_path", !!artifacts.diffMarkdown || !!artifacts.diff);
      return entries;
    }

    function artifactLoadedForOutput(key) {
      const artifacts = selectedArtifacts();
      const checks = {
        episode_source_path: () => !!artifacts.episode,
        coding_observations_path: () => (artifacts.coding || []).length > 0,
        world_model_path: () => !!artifacts.world,
        world_model_snapshots_path: () => snapshotsOf(artifacts).length > 0,
        world_model_diff_path: () => worldDiffsOf(artifacts).length > 0,
        world_transitions_path: () => transitionsOf(artifacts).length > 0,
        observability_events_path: () => (artifacts.observabilityEvents || []).length > 0,
        coverage_signals_path: () => (artifacts.coverage || []).length > 0,
        evaluation_lenses_path: () => (artifacts.lenses || []).length > 0,
        harness_report_path: () => !!artifacts.harnessMarkdown || !!artifacts.harness,
        evaluation_diff_path: () => !!artifacts.diffMarkdown || !!artifacts.diff
      };
      return checks[key]?.() || false;
    }

    function bindPanelEvents() {
      document.querySelectorAll("[data-signal]").forEach((input) => {
        input.addEventListener("change", () => {
          if (input.checked) state.reviewedSignals.add(input.dataset.signal);
          else state.reviewedSignals.delete(input.dataset.signal);
          renderTabs(selectedArtifacts());
        });
      });
      document.querySelectorAll("[data-artifact-view]").forEach((button) => {
        button.addEventListener("click", () => {
          const view = button.dataset.artifactView;
          const tab = button.dataset.artifactTab;
          const turn = Number(button.dataset.artifactTurn);
          const transitionId = button.dataset.artifactTransition;
          const graphProjection = button.dataset.artifactGraphProjection;
          if (view) state.activeView = view;
          if (tab) state.activeTab = tab;
          if (Number.isFinite(turn) && turn > 0) state.selectedTurn = turn;
          if (transitionId) state.selectedTransitionId = transitionId;
          if (graphProjection) state.graphProjectionMode = graphProjection;
          render();
        });
      });
      document.querySelectorAll("[data-observability-turn]").forEach((button) => {
        button.addEventListener("click", () => {
          const turn = Number(button.dataset.observabilityTurn);
          const transitionId = button.dataset.observabilityTransition;
          state.selectedObservabilityEventId = button.dataset.observabilityEvent || "";
          if (Number.isFinite(turn) && turn > 0) state.selectedTurn = turn;
          if (transitionId) state.selectedTransitionId = transitionId;
          state.activeView = "transition";
          render();
        });
      });
      document.querySelectorAll("[data-observability-filter]").forEach((button) => {
        button.addEventListener("click", () => {
          state.observabilityEventFilter = button.dataset.observabilityFilter || "all";
          state.observabilityReviewStateFilter = "all";
          renderTabs(selectedArtifacts());
        });
      });
      document.querySelectorAll("[data-observability-review-state]").forEach((button) => {
        button.addEventListener("click", () => {
          state.observabilityReviewStateFilter = button.dataset.observabilityReviewState || "all";
          state.observabilityEventFilter = "review";
          renderTabs(selectedArtifacts());
        });
      });
      document.querySelectorAll("[data-observability-payload-search]").forEach((input) => {
        input.addEventListener("change", () => {
          state.observabilityPayloadSearch = input.value || "";
          renderTabs(selectedArtifacts());
        });
      });
      document.querySelectorAll("[data-graph-projection]").forEach((button) => {
        button.addEventListener("click", () => {
          state.graphProjectionMode = button.dataset.graphProjection;
          renderTabs(selectedArtifacts());
        });
      });
      document.querySelectorAll("[data-delta-review-save]").forEach((button) => {
        button.addEventListener("click", () => {
          const reviewState = button.dataset.deltaReviewState || "";
          const overrides = reviewState ? {
            review_state: reviewState,
            review_state_label: deltaCandidateReviewStateLabelFromKey(reviewState)
          } : {};
          saveDeltaReviewCandidate(button.dataset.deltaReviewSave, overrides);
        });
      });
      document.querySelectorAll("[data-delta-review-notes]").forEach((input) => {
        input.addEventListener("input", () => {
          state.deltaReviewNotesDrafts[input.dataset.deltaReviewNotes] = input.value || "";
        });
      });
      document.querySelectorAll("[data-delta-candidate]").forEach((card) => {
        card.addEventListener("click", (event) => {
          if (event.target.closest("button, summary, details, pre, input, textarea")) return;
          state.selectedDeltaCandidateId = card.dataset.deltaCandidate || "";
          renderTabs(selectedArtifacts());
        });
      });
      document.querySelectorAll("[data-review-candidate]").forEach((button) => {
        button.addEventListener("click", () => {
          state.activeView = "transition";
          state.activeTab = "diff";
          state.selectedDeltaCandidateId = button.dataset.reviewCandidate || "";
          state.observabilityPayloadSearch = state.selectedDeltaCandidateId;
          render();
        });
      });
      document.querySelectorAll("[data-review-evidence-turn]").forEach((button) => {
        button.addEventListener("click", () => {
          const turn = Number(button.dataset.reviewEvidenceTurn);
          if (Number.isFinite(turn) && turn > 0) state.selectedTurn = turn;
          state.activeView = "reading";
          render();
        });
      });
    }

    if (new URLSearchParams(window.location.search).get("empty") === "1") {
      loadEmptyDemo();
    } else {
      loadDemo();
    }
  </script>
</body>
</html>
