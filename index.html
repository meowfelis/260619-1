<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MVP3 時系列デモ</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #637083;
      --line: #d8dee8;
      --blue: #2663eb;
      --green: #16825d;
      --yellow: #a86500;
      --red: #bf2f35;
      --teal: #087f8c;
      --violet: #6842b8;
      --shadow: 0 1px 2px rgba(23, 32, 42, 0.06);
    }

    * { box-sizing: border-box; }

    [hidden] { display: none !important; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      letter-spacing: 0;
    }

    button, input, textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 6px;
      min-height: 34px;
      padding: 0 12px;
      cursor: pointer;
    }

    button:hover { border-color: #9aa8ba; }
    button.primary { background: var(--blue); color: #fff; border-color: var(--blue); }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr;
    }

    header {
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 60px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .file-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--muted);
      font-size: 13px;
    }

    .file-pill input {
      width: 164px;
      color: var(--muted);
      font-size: 12px;
    }

    .view-switch,
    .mode-switch {
      display: inline-flex;
      gap: 4px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f3f5f8;
    }

    .view-switch button,
    .mode-switch button {
      min-height: 30px;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
    }

    .view-switch button.active,
    .mode-switch button.active {
      background: #17202a;
      color: #fff;
      border-color: #17202a;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(6, minmax(92px, 1fr));
      gap: 1px;
      border-bottom: 1px solid var(--line);
      background: var(--line);
    }

    .metric {
      background: #fff;
      padding: 9px 12px;
      min-height: 54px;
    }

    .metric .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .metric .value {
      font-size: 18px;
      line-height: 1;
      font-weight: 700;
    }

    .metric .hint {
      color: var(--muted);
      font-size: 11px;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    main {
      display: grid;
      grid-template-columns: minmax(220px, 250px) minmax(0, 1fr);
      min-height: 0;
    }

    body.focus-transition .summary {
      display: none;
    }

    body.focus-transition main {
      grid-template-columns: minmax(0, 1fr);
    }

    body.focus-transition aside {
      display: none;
    }

    body.focus-transition.explain-mode .transition-workspace {
      grid-template-columns: minmax(320px, 0.85fr) minmax(420px, 1.15fr);
    }

    body.focus-transition.explain-mode [data-transition-list] {
      display: none;
    }

    body.reading-view.explain-mode .workspace {
      grid-template-rows: minmax(520px, 1fr);
    }

    body.reading-view.explain-mode #tabs,
    body.reading-view.explain-mode #tabPanel {
      display: none;
    }

    body.codebook-view.explain-mode .codebook-workspace {
      grid-template-rows: auto minmax(420px, 1fr);
    }

    body.codebook-view.explain-mode .codebook-grid {
      border-bottom: 0;
    }

    body.codebook-view.explain-mode #codebookBottom {
      display: none;
    }

    body:not(.explain-mode) .view-story {
      display: none;
    }

    body:not(.explain-mode) .explain-path {
      display: none;
    }

    body:not(.explain-mode) .explain-brief {
      display: none;
    }

    .explain-path {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
      overflow-x: auto;
    }

    .path-label {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .path-step {
      flex: 0 0 auto;
      min-height: 30px;
      border-radius: 999px;
      background: #fff;
      display: grid;
      gap: 1px;
      justify-items: start;
      padding: 6px 11px;
    }

    .path-step.active {
      border-color: #17202a;
      background: #17202a;
      color: #fff;
    }

    .path-step .path-main {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.15;
    }

    .path-step .path-sub {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.15;
    }

    .path-step.active .path-sub {
      color: #d8dee8;
    }

    .path-step.path-next {
      border-color: #1f6feb;
      background: #f3f8ff;
      color: #123b6d;
    }

    .path-step.path-next .path-sub {
      color: #3b648d;
    }

    .explain-brief {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .brief-main {
      margin: 0;
      color: #111827;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
    }

    .brief-cue {
      display: inline-flex;
      width: fit-content;
      margin: 0 0 5px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #edf6ff;
      color: #17456f;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.2;
    }

    .brief-sub {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .brief-takeaway {
      margin: 6px 0 0;
      padding: 7px 9px;
      border: 1px solid #d7e7f7;
      border-radius: 8px;
      background: #fbfdff;
      color: #182230;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
    }

    .brief-takeaway strong {
      margin-right: 4px;
      color: #17456f;
      font-size: 11px;
    }

    .explain-brief.compact .brief-takeaway {
      border-color: #1f6feb;
      background: #f3f8ff;
    }

    .brief-pitch {
      grid-column: 1 / -1;
      margin: 0;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-left: 3px solid #1f6feb;
      border-radius: 8px;
      background: #f7fbff;
      color: #263445;
      font-size: 12px;
      line-height: 1.5;
    }

    .brief-pitch strong {
      display: block;
      margin-bottom: 3px;
      color: #123b6d;
      font-size: 11px;
    }

    .brief-toggle {
      margin-left: 8px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
    }

    .explain-brief.compact .brief-pitch,
    .explain-brief.compact .brief-script {
      display: none;
    }

    .brief-kpis {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
    }

    .brief-script {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .brief-script li {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
      padding: 8px 9px;
      color: #2c3746;
      font-size: 12px;
      line-height: 1.4;
    }

    .brief-script li.active {
      border-color: #1f6feb;
      background: #f3f8ff;
      color: #17202a;
      font-weight: 700;
    }

    aside {
      border-right: 1px solid var(--line);
      background: #fff;
      min-width: 0;
      overflow: auto;
    }

    .side-title {
      padding: 14px 14px 8px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .case-list {
      display: grid;
      gap: 8px;
      padding: 0 10px 14px;
    }

    .case-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      text-align: left;
      min-height: 84px;
    }

    .case-item.active {
      border-color: var(--blue);
      box-shadow: inset 3px 0 0 var(--blue);
    }

    .case-name {
      font-weight: 700;
      font-size: 14px;
      line-height: 1.25;
      margin-bottom: 8px;
    }

    .chips {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 7px;
      border-radius: 999px;
      background: #eef1f5;
      color: #3f4c5f;
      font-size: 12px;
      max-width: 100%;
    }

    .chip.warn { background: #fff3d8; color: var(--yellow); }
    .chip.bad { background: #ffe6e8; color: var(--red); }
    .chip.good { background: #e3f5ee; color: var(--green); }
    .chip.info { background: #e8efff; color: var(--blue); }
    .chip.violet { background: #f0eaff; color: var(--violet); }

    button.chip {
      border: 0;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
    }

    button.chip:hover {
      filter: brightness(0.96);
    }

    button.chip:disabled {
      cursor: default;
      opacity: 0.55;
    }

    .workspace {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(360px, 58vh) auto 1fr;
      overflow: hidden;
    }

    .workspace.codebook-mode {
      grid-template-rows: minmax(420px, 1fr);
    }

    .workspace.transition-mode {
      grid-template-rows: minmax(520px, 1fr);
    }

    .top-grid {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(360px, 0.95fr) minmax(360px, 1.05fr);
      border-bottom: 1px solid var(--line);
    }

    .codebook-workspace {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(360px, 1fr) minmax(150px, auto);
      overflow: hidden;
    }

    .codebook-grid {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(260px, 0.72fr) minmax(420px, 1.28fr);
      border-bottom: 1px solid var(--line);
    }

    .transition-workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(240px, 0.7fr) minmax(360px, 1fr) minmax(360px, 1fr);
      overflow: hidden;
      background: var(--panel);
    }

    .dynamic-story {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(4, minmax(170px, 1fr));
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .view-story {
      grid-column: 1 / -1;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .story-lead,
    .story-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 11px;
      min-width: 0;
    }

    .story-lead {
      grid-column: 1 / -1;
    }

    .story-lead h3,
    .story-card h3 {
      margin: 0 0 6px;
      font-size: 14px;
      line-height: 1.25;
    }

    .story-lead p,
    .story-card p {
      margin: 0;
      color: #2c3746;
      font-size: 13px;
      line-height: 1.45;
    }

    .story-lead .story-thesis {
      margin-top: 6px;
      color: #111827;
      font-weight: 700;
    }

    .story-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 9px;
    }

    .story-actions button {
      min-height: 30px;
      border-radius: 6px;
      background: #f8fafc;
    }

    .story-script {
      margin: 9px 0 0;
      padding-left: 18px;
      color: #2c3746;
      font-size: 13px;
      line-height: 1.45;
    }

    .story-script li + li {
      margin-top: 3px;
    }

    .story-card strong {
      display: block;
      margin-bottom: 4px;
      font-size: 20px;
      line-height: 1;
    }

    .code-list {
      display: grid;
      gap: 8px;
      padding: 14px;
    }

    .code-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      text-align: left;
      display: grid;
      gap: 8px;
      min-height: 76px;
    }

    .code-item.active {
      border-color: var(--blue);
      box-shadow: inset 3px 0 0 var(--blue);
    }

    .timeline-item {
      width: 100%;
      display: grid;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: inherit;
      cursor: pointer;
      font: inherit;
      padding: 8px;
      text-align: left;
    }

    .timeline-item.active {
      border-color: var(--blue);
      box-shadow: inset 3px 0 0 var(--blue);
    }

    .event-payload {
      max-height: 180px;
      overflow: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
      color: #334155;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      line-height: 1.45;
      padding: 8px;
    }

    .code-name {
      font-weight: 700;
      font-size: 14px;
    }

    .transition-lane {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .transition-step {
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 10px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      min-height: 74px;
    }

    .transition-step[role="button"] {
      cursor: pointer;
    }

    .transition-step.selected {
      border-color: var(--blue);
      box-shadow: inset 3px 0 0 var(--blue);
    }

    .transition-step strong {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 28px;
      border-radius: 6px;
      background: #e8efff;
      color: var(--blue);
      font-size: 12px;
    }

    .transition-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      display: grid;
      gap: 9px;
      box-shadow: var(--shadow);
    }

    .transition-card.selected {
      border-color: var(--blue);
      box-shadow: inset 3px 0 0 var(--blue), var(--shadow);
    }

    .transition-card-note {
      padding: 7px 8px;
      border-radius: 8px;
      background: #fbfcfe;
      color: #3a4658;
      font-size: 12px;
      line-height: 1.45;
    }

    .transition-mode-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 14px 0;
    }

    .transition-mode-summary button.active {
      border-color: #17202a;
      background: #17202a;
      color: #fff;
    }

    .transition-mode-status {
      flex-basis: 100%;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .transition-lead {
      margin: 8px 0 12px;
      padding: 10px 12px;
      border: 1px solid #d7e7f7;
      border-left: 3px solid var(--blue);
      border-radius: 8px;
      background: #f7fbff;
      color: #223047;
      font-size: 13px;
      line-height: 1.5;
    }

    .transition-lead strong {
      display: block;
      margin-bottom: 4px;
      color: #123b6d;
      font-size: 12px;
    }

    .transition-read-steps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
      gap: 8px;
      margin: 0 0 12px;
    }

    .transition-read-step {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 8px;
      min-width: 0;
    }

    .transition-read-step strong {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 11px;
    }

    .transition-read-step span {
      display: -webkit-box;
      overflow: hidden;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      color: #223047;
      font-size: 12px;
      line-height: 1.35;
    }

    .transition-evidence-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin: 0 0 12px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .transition-evidence-actions strong {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .source-span-item {
      width: 100%;
      display: block;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font: inherit;
      line-height: 1.35;
      padding: 4px 5px;
      text-align: left;
      overflow-wrap: anywhere;
    }

    .source-span-item:hover {
      background: #eef4ff;
    }

    .source-span-item.selected {
      background: #fff7d6;
      box-shadow: 0 0 0 1px #facc15 inset;
    }

    .source-quote-comparison {
      display: grid;
      gap: 6px;
      margin-top: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
    }

    .source-quote-comparison > strong {
      color: var(--muted);
      font-size: 12px;
    }

    .source-quote-button {
      width: 100%;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font: inherit;
      padding: 4px 5px;
      text-align: left;
    }

    .source-quote-button:hover {
      background: #eef4ff;
    }

    .source-highlight {
      border-radius: 3px;
      background: #fff3b0;
      box-shadow: 0 0 0 1px #facc15 inset;
    }

    .fidelity-signals {
      display: grid;
      gap: 8px;
    }

    .fidelity-signal {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: #fff;
    }

    .fidelity-signal strong {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .path-text {
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .artifact-actions {
      display: flex;
      justify-content: flex-end;
    }

    .artifact-actions button:disabled {
      color: var(--muted);
      cursor: default;
    }

    .mechanism-flow {
      display: grid;
      gap: 8px;
      margin: 12px 0;
    }

    .mechanism-step {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 10px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 9px;
    }

    .mechanism-step strong {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    section {
      min-width: 0;
      min-height: 0;
      overflow: auto;
      background: var(--panel);
    }

    section + section {
      border-left: 1px solid var(--line);
    }

    .section-head {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 44px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(8px);
    }

    h2 {
      margin: 0;
      font-size: 14px;
      line-height: 1.2;
    }

    .timeline {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .turn {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      display: grid;
      gap: 8px;
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    .turn:hover {
      border-color: #9aa8ba;
    }

    .turn.selected {
      border-color: var(--blue);
      box-shadow: inset 3px 0 0 var(--blue), var(--shadow);
    }

    .turn.has-coverage {
      border-color: #d99a20;
      box-shadow: inset 3px 0 0 var(--yellow), var(--shadow);
    }

    .turn.has-warning {
      border-color: #d66b70;
      box-shadow: inset 3px 0 0 var(--red), var(--shadow);
    }

    .turn.selected.has-coverage {
      border-color: var(--blue);
      box-shadow: inset 3px 0 0 var(--blue), inset 6px 0 0 var(--yellow), var(--shadow);
    }

    .turn.selected.has-warning {
      border-color: var(--blue);
      box-shadow: inset 3px 0 0 var(--blue), inset 6px 0 0 var(--red), var(--shadow);
    }

    .turn-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .speaker {
      color: var(--ink);
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .utterance {
      font-size: 14px;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .graph-wrap {
      min-height: 100%;
      display: grid;
      grid-template-rows: minmax(260px, 1fr) auto;
    }

    svg {
      width: 100%;
      height: 100%;
      min-height: 240px;
      background: #fbfcfe;
    }

    .graph-details {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1px;
      background: var(--line);
      border-top: 1px solid var(--line);
    }

    .turn-inspector {
      border-top: 1px solid var(--line);
      background: #fff;
      padding: 14px;
      min-height: 100%;
    }

    .turn-inspector h3 {
      margin: 0 0 8px;
      font-size: 14px;
      line-height: 1.25;
    }

    .inspector-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .inspector-block {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfe;
    }

    .inspector-block h4 {
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .detail-box {
      background: #fff;
      min-height: 92px;
      padding: 10px 12px;
    }

    .detail-box h3 {
      margin: 0 0 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .mini-list {
      display: grid;
      gap: 6px;
      font-size: 13px;
      line-height: 1.35;
    }

    .tabs {
      display: flex;
      gap: 4px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      overflow-x: auto;
    }

    .tab {
      min-height: 32px;
      white-space: nowrap;
      color: var(--muted);
    }

    .tab.active {
      color: #fff;
      background: #17202a;
      border-color: #17202a;
    }

    .tab-panel {
      padding: 14px;
      overflow: auto;
      background: var(--bg);
    }

    .panel-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(260px, 1fr));
      gap: 12px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 14px;
      line-height: 1.25;
    }

    .score-row {
      display: grid;
      grid-template-columns: 110px 1fr 44px;
      gap: 10px;
      align-items: center;
      margin: 8px 0;
    }

    .bar {
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: #e7ebf1;
    }

    .bar > span {
      display: block;
      height: 100%;
      background: var(--teal);
    }

    .body-text {
      color: #2c3746;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .coverage-list {
      display: grid;
      gap: 10px;
    }

    .signal {
      border-left: 4px solid var(--yellow);
    }

    .signal.reviewed {
      border-left-color: var(--green);
      opacity: 0.82;
    }

    label.inline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .empty {
      color: var(--muted);
      padding: 18px;
      font-size: 14px;
    }

    .snapshot-compare {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .snapshot-column {
      display: grid;
      gap: 6px;
      min-width: 0;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
    }

    .snapshot-column strong {
      color: var(--ink);
      font-size: 13px;
    }

    .snapshot-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }

    .snapshot-list span {
      padding: 2px 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #334155;
      font-size: 11px;
      overflow-wrap: anywhere;
    }

    .delta-candidate-list {
      display: grid;
      gap: 6px;
    }

    .delta-candidate {
      display: grid;
      gap: 4px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .delta-candidate.added {
      border-left: 4px solid var(--green);
    }

    .delta-candidate.removed {
      border-left: 4px solid #9ca3af;
      background: #f8fafc;
    }

    .delta-candidate.selected {
      border-color: var(--blue);
      box-shadow: inset 3px 0 0 var(--blue);
      background: #f7fbff;
    }

    .delta-review-state {
      width: fit-content;
      padding: 2px 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff7ed;
      color: #9a3412;
      font-size: 11px;
      font-weight: 700;
    }

    .review-state-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin-top: 8px;
    }

    .review-state-actions .chip {
      cursor: pointer;
    }

    .review-note-input {
      width: 100%;
      box-sizing: border-box;
      min-height: 58px;
      margin-top: 8px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      resize: vertical;
    }

    @media (max-width: 760px) {
      header { align-items: flex-start; flex-direction: column; }
      .toolbar { margin-left: 0; justify-content: flex-start; }
      .summary { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      main { grid-template-columns: 1fr; }
      aside { border-right: 0; border-bottom: 1px solid var(--line); max-height: 220px; }
      .workspace { grid-template-rows: auto auto 1fr; }
      .top-grid { grid-template-columns: 1fr; }
      .codebook-workspace { grid-template-rows: auto auto; }
      .codebook-grid { grid-template-columns: 1fr; }
      .transition-workspace { grid-template-columns: 1fr; }
      .dynamic-story { grid-template-columns: 1fr; }
      .transition-read-steps { grid-template-columns: 1fr; }
      .brief-script { grid-template-columns: 1fr; }
      section + section { border-left: 0; border-top: 1px solid var(--line); }
      .panel-grid { grid-template-columns: 1fr; }
      .graph-details { grid-template-columns: 1fr; }
      .inspector-grid { grid-template-columns: 1fr; }
      .snapshot-compare { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <h1 id="pageTitle">MVP3 時系列デモ</h1>
        <div class="subtitle" id="subtitle">テキストからコード、関係グラフ、評価のつながりを見る</div>
      </div>
      <div class="toolbar">
        <div class="view-switch" aria-label="ビュー切替">
          <button type="button" data-view="reading">読解</button>
          <button type="button" data-view="codebook">コードブック</button>
          <button type="button" data-view="transition">動的</button>
        </div>
        <div class="mode-switch" aria-label="表示モード切替">
          <button type="button" data-mode="explain">説明</button>
          <button type="button" data-mode="research">研究</button>
        </div>
      </div>
    </header>

    <div class="summary" id="summary"></div>
    <div class="explain-path" id="explainPath"></div>
    <div class="explain-brief" id="explainBrief"></div>

    <main>
      <aside>
        <div class="side-title">ケース</div>
        <div class="case-list" id="caseList"></div>
      </aside>

      <div class="workspace" id="workspace">
        <div class="top-grid" id="readingTopGrid">
          <div class="view-story" id="readingStory"></div>
          <section>
            <div class="section-head">
              <h2>テキスト</h2>
              <span class="chip info" id="turnCount">0件</span>
            </div>
            <div class="timeline" id="timeline"></div>
          </section>
          <section>
            <div class="section-head">
              <h2>読み解き</h2>
              <span class="chip" id="selectedTurnChip">T1</span>
            </div>
            <div class="turn-inspector" id="turnInspector"></div>
          </section>
        </div>

        <div class="tabs" id="tabs"></div>
        <div class="tab-panel" id="tabPanel"></div>

        <div class="codebook-workspace" id="codebookWorkspace" hidden>
          <div class="view-story" id="codebookStory"></div>
          <div class="codebook-grid">
            <section>
              <div class="section-head">
                <h2>コード</h2>
                <span class="chip info" id="codeCount">0件</span>
              </div>
              <div class="code-list" id="codeList"></div>
            </section>
            <section>
              <div class="section-head">
                <h2>コードブック</h2>
                <span class="chip" id="selectedCodeChip">-</span>
              </div>
              <div class="turn-inspector" id="codeDetail"></div>
            </section>
          </div>
          <div class="tab-panel" id="codebookBottom"></div>
        </div>

        <div class="transition-workspace" id="transitionWorkspace" hidden>
          <div class="dynamic-story" id="dynamicStory"></div>
          <section>
            <div class="section-head">
              <h2>時系列</h2>
              <span class="chip info" id="transitionStepCount">0件</span>
            </div>
            <div class="transition-lane" id="transitionLane"></div>
          </section>
          <section data-transition-list>
            <div class="section-head">
              <h2>変化</h2>
              <span class="chip info" id="transitionCount">0件</span>
            </div>
            <div class="transition-mode-summary" id="transitionModeSummary"></div>
            <div class="transition-lane" id="transitionList"></div>
          </section>
          <section>
            <div class="section-head">
              <h2>変化の詳細</h2>
              <span class="chip" id="selectedTransitionChip">-</span>
            </div>
            <div class="turn-inspector" id="transitionDetail"></div>
          </section>
        </div>
      </div>
    </main>
  </div>

  <script src="data.demo.js"></script>

    function jp(kind, value) {
      return labelMaps[kind]?.[value] || value || "";
    }

    function emptyBatch(batchId = "empty-workbench") {
      return { batch_id: batchId, aggregate: {}, cases: [] };
    }

    function normalizeBatch(batch, batchId = "empty-workbench") {
      const normalized = batch && typeof batch === "object" ? batch : emptyBatch(batchId);
      return {
        ...normalized,
        aggregate: normalized.aggregate || {},
        cases: Array.isArray(normalized.cases) ? normalized.cases : []
      };
    }

    function firstCaseId(batch) {
      return normalizeBatch(batch).cases[0]?.case_id || "";
    }

    function selectedArtifacts() {
      const batch = normalizeBatch(state.batch);
      const selectedCaseId = state.selectedCaseId || firstCaseId(batch);
      return state.artifactsByCase[selectedCaseId] || {};
    }

    function messagesOf(episode) {
      return episode?.messages || episode?.records || [];
    }

    function argumentOf(message) {
      return message?.action?.argument || message?.text || message?.argument || "";
    }

    function loadDemo() {
      state.batch = normalizeBatch(demo.batch, "demo-mvp2-workbench");
      state.artifactsByCase = structuredClone(demo.artifactsByCase || {});
      state.selectedCaseId = firstCaseId(state.batch);
      state.selectedTurn = 1;
      state.selectedCode = "";
      state.reviewedSignals.clear();
      render();
      loadDynamicCodingSeedRegistry();
      loadSavedDeltaReviewEvents();
    }

    function loadEmptyDemo() {
      state.batch = emptyBatch("empty-demo");
      state.artifactsByCase = {};
      state.selectedCaseId = "";
      state.selectedTurn = 1;
      state.selectedCode = "";
      state.reviewedSignals.clear();
      render();
      loadDynamicCodingSeedRegistry();
      loadSavedDeltaReviewEvents();
    }

    async function readText(file) {
      return await file.text();
    }

    function parseJsonl(text) {
      return text
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean)
        .map((line) => JSON.parse(line));
    }

    function assignArtifact(target, fileName, parsed, raw) {
      if (fileName === "episode.source.json") target.episode = parsed;
      else if (fileName === "world-model.json") target.world = parsed;
      else if (fileName === "world-transitions.json") target.transitions = parsed;
      else if (fileName === "world-model-snapshots.json") target.worldSnapshots = parsed;
      else if (fileName === "world-model-diff.json" || fileName === "world-model-diffs.json") target.worldDiffs = parsed;
      else if (fileName === "world-model-coverage.json") target.coverage = parsed;
      else if (fileName === "eval-dialogue-quality.json") target.lenses = parsed;
      else if (fileName === "run-manifest.json") target.manifest = parsed;
      else if (fileName === "coding-observations.jsonl") target.coding = parsed;
      else if (fileName === "observability-events.jsonl") target.observabilityEvents = parsed;
      else if (fileName === "evaluation-diff.md") target.diffMarkdown = raw;
      else if (fileName === "eval-harness.md") target.harnessMarkdown = raw;
      else target[fileName] = parsed ?? raw;
    }

    document.querySelectorAll("[data-view]").forEach((button) => {
      button.addEventListener("click", () => {
        state.activeView = button.dataset.view;
        render();
      });
    });

    document.querySelectorAll("[data-mode]").forEach((button) => {
      button.addEventListener("click", () => {
        state.presentationMode = button.dataset.mode;
        render();
      });
    });

    function render() {
      const batch = normalizeBatch(state.batch);
      state.batch = batch;
      const caseInfo = batch.cases.find((item) => item.case_id === state.selectedCaseId) || batch.cases[0];
      if (caseInfo && state.selectedCaseId !== caseInfo.case_id) state.selectedCaseId = caseInfo.case_id;
      if (!caseInfo && !state.artifactsByCase[state.selectedCaseId]) state.selectedCaseId = "";
      const artifacts = selectedArtifacts();
      const turns = messagesOf(artifacts.episode).map((message, index) => Number(message.turn || index + 1));
      if (turns.length && !turns.includes(Number(state.selectedTurn))) state.selectedTurn = turns[0];
      if (!turns.length) state.selectedTurn = 1;
      $("selectedTurnChip").textContent = turns.length ? `T${state.selectedTurn}` : "-";
      renderSummary(batch, artifacts, caseInfo);
      renderCases(batch);
      renderViewSwitch(caseInfo);
      renderModeSwitch();
      renderExplainPath(artifacts);
      renderExplainBrief(caseInfo, artifacts);
      if (state.activeView === "codebook") {
        renderCodebookView(artifacts);
      } else if (state.activeView === "transition") {
        renderTransitionView(artifacts);
      } else {
        renderReadingView(artifacts);
      }
      bindStoryActions();
    }

    function renderViewSwitch(caseInfo) {
      document.querySelectorAll("[data-view]").forEach((button) => {
        button.classList.toggle("active", button.dataset.view === state.activeView);
      });
      document.body.classList.toggle("focus-transition", state.activeView === "transition");
      document.body.classList.toggle("reading-view", state.activeView === "reading");
      document.body.classList.toggle("codebook-view", state.activeView === "codebook");
      document.body.classList.toggle("explain-mode", state.presentationMode === "explain");
      const copy = viewCopyOf(caseInfo);
      $("pageTitle").textContent = copy.title;
      $("subtitle").textContent = copy.subtitle;
      $("workspace").classList.toggle("codebook-mode", state.activeView === "codebook");
      $("workspace").classList.toggle("transition-mode", state.activeView === "transition");
      $("readingTopGrid").hidden = state.activeView !== "reading";
      $("tabs").hidden = state.activeView !== "reading";
      $("tabPanel").hidden = state.activeView !== "reading";
      $("codebookWorkspace").hidden = state.activeView !== "codebook";
      $("transitionWorkspace").hidden = state.activeView !== "transition";
    }

    function viewCopyOf(caseInfo) {
      const caseLabel = caseInfo?.label || "静的デモ";
      if (state.presentationMode === "explain") {
        const explainCopy = {
          reading: {
            title: "本文から根拠を見る",
            subtitle: `${caseLabel} / 発言や記述を、コード・信号・世界モデルへ接続する入口`
          },
          codebook: {
            title: "コードで言葉を揃える",
            subtitle: `${caseLabel} / 何を観測する言葉か、含める境界と除外する境界を見る`
          },
          transition: {
            title: "時間変化として読む",
            subtitle: `${caseLabel} / 起きたこと、変わった世界、評価信号、次アクションをつなげて見る`
          }
        };
        return explainCopy[state.activeView] || explainCopy.reading;
      }
      const researchCopy = {
        reading: {
          title: "MVP3 時系列デモ 読解",
          subtitle: `${caseLabel} / コード、関係グラフ、評価、差分を詳しく確認`

          subtitle: `${caseLabel} / 変化一覧、世界モデル差分、フィデリティ信号を詳しく確認`

      document.querySelectorAll("[data-mode]").forEach((button) => {

    function renderExplainPath(artifacts) {
      const messages = messagesOf(artifacts.episode);
      const codingCount = artifacts.coding?.length || 0;
      const transitionCount = transitionsOf(artifacts).length;
      const steps = [
        { view: "reading", label: "1 本文", hint: `${messages.length || 0}件`, purpose: "根拠を見る" },
        { view: "codebook", label: "2 コード", hint: `${codingCount}観測`, purpose: "言葉を揃える" },
        { view: "transition", label: "3 変化", hint: `${transitionCount}件`, purpose: "時間で読む" }
      ];
      $("explainPath").innerHTML = `
        <span class="path-label">説明ルート</span>
        ${steps.map((step) => `
          <button type="button" class="path-step ${state.activeView === step.view ? "active" : ""}" data-story-view="${step.view}" title="${escapeHtml(step.purpose)}">
            <span class="path-main">${escapeHtml(step.label)} / ${escapeHtml(step.hint)}</span>
            <span class="path-sub">${escapeHtml(step.purpose)}</span>
          </button>
        `).join("")}
        <button type="button" class="path-step" data-story-mode="research" title="根拠まで掘る">
          <span class="path-main">4 研究モード</span>
          <span class="path-sub">根拠まで掘る</span>
        </button>
        <button type="button" class="path-step path-next" data-story-next title="説明を次へ進める">
          <span class="path-main">${escapeHtml(nextExplainLabel())}</span>
          <span class="path-sub">一本道で進める</span>
        </button>
      `;
    }

    function nextExplainLabel() {
      if (state.presentationMode !== "explain") return "説明へ戻る";
      if (state.activeView === "reading") return "次へ: コード";
      if (state.activeView === "codebook") return "次へ: 変化";
      if (state.activeView === "transition") return "次へ: 研究";
      return "次へ";
    }

    function goNextExplainStep() {
      if (state.presentationMode !== "explain") {
        state.presentationMode = "explain";
        state.activeView = "reading";
      } else if (state.activeView === "reading") {
        state.activeView = "codebook";
      } else if (state.activeView === "codebook") {
        state.activeView = "transition";
      } else if (state.activeView === "transition") {
        state.presentationMode = "research";
      } else {
        state.activeView = "reading";
      }
      render();
    }

    function explainCueOf() {
      if (state.activeView === "codebook") {
        return "いま話すこと: 根拠を読むための言葉を揃える";
      }
      if (state.activeView === "transition") {
        return "いま話すこと: 状況がどう変わったかを時間で読む";
      }
      return "いま話すこと: 本文のどこに根拠があるかを見る";
    }

    function explainTakeawayOf() {
      if (state.activeView === "codebook") {
        return "持ち帰り: コードは分類名ではなく、何を観測するかを揃えるレンズになる。";
      }
      if (state.activeView === "transition") {
        return "持ち帰り: 支援の質は静止画ではなく、非対称性を調整し続ける動きとして評価できる。";
      }
      return "持ち帰り: 根拠が見えると、コードや変化の説明が独断ではなく検証可能になる。";
    }

    function explainPitchOf() {
      if (state.activeView === "codebook") {
        return "この段階では、発言や記述をすぐ結論にせず、どんな観測語彙で読むかを揃えます。コードブックは正解表ではなく、見え方の違いを比較し、後で更新できる研究上の足場です。";
      }
      if (state.activeView === "transition") {
        return "ここでは、時点ごとの世界モデル差分を見ながら、支援が事後対処に寄っているのか、細かい再調整として働いているのかを読みます。動的フィデリティは、この変化の質を評価するための入口です。";
      }
      return "最初に本文の根拠を確認します。どの一文や発言からコードや信号が立ち上がったのかを示すことで、AIの読み解きを後から人間が点検できる形にします。";
    }

    function explainStepIndex() {
      if (state.activeView === "codebook") return 1;
      if (state.activeView === "transition") return 2;
      return 0;
    }

    function renderExplainBrief(caseInfo, artifacts) {
      const messages = messagesOf(artifacts.episode);
      const codingCount = artifacts.coding?.length || 0;
      const transitionCount = transitionsOf(artifacts).length;
      const coverageCount = Array.isArray(artifacts.coverage) ? artifacts.coverage.length : Number(caseInfo?.coverage_signals || 0);
      const caseLabel = caseInfo?.label || "静的デモ";
      const activeStep = explainStepIndex();
      const scriptItems = [
        "まず、本文のどこに根拠があるかを見ます。",
        "次に、その根拠をどんなコードの言葉で読むかを揃えます。",
        "最後に、時間の中で何が変わり、次に何を見るかを決めます。"
      ];
      $("explainBrief").classList.toggle("compact", !state.briefExpanded);
      $("explainBrief").innerHTML = `
        <div>
          <p class="brief-cue">${escapeHtml(explainCueOf())}</p>
          <p class="brief-main">${escapeHtml(caseLabel)}を、本文の根拠、コードの語彙、時間変化の3層で説明します。</p>
          <p class="brief-sub">三位一体支援を「三者が揃うこと」だけでなく、非対称性を調整し続けるプロセスとして読むためのデモです。</p>
          <p class="brief-takeaway"><strong>要点</strong>${escapeHtml(explainTakeawayOf().replace(/^持ち帰り: /, ""))}</p>
        </div>
        <div class="brief-kpis">
          <span class="chip info">${escapeHtml(messages.length || 0)}本文</span>
          <span class="chip">${escapeHtml(codingCount)}観測</span>
          <span class="chip good">${escapeHtml(transitionCount)}変化</span>
          ${coverageCount ? `<span class="chip warn">${escapeHtml(coverageCount)}確認</span>` : ""}
          <button type="button" class="brief-toggle" data-brief-toggle>${state.briefExpanded ? "説明を畳む" : "説明を開く"}</button>
        </div>
        <p class="brief-pitch"><strong>30秒説明</strong>${escapeHtml(explainPitchOf())}</p>
        <ol class="brief-script">
          ${scriptItems.map((item, index) => `<li class="${index === activeStep ? "active" : ""}">${escapeHtml(item)}</li>`).join("")}
        </ol>
      `;
    }

    function renderReadingView(artifacts) {
      renderReadingStory(artifacts);
      renderTimeline(artifacts);
      renderTurnInspector(artifacts);
      renderTabs(artifacts);
    }

    function renderReadingStory(artifacts) {
      const messages = messagesOf(artifacts.episode);
      const selected = messages.find((message, index) => Number(message.turn || index + 1) === Number(state.selectedTurn));
      const signals = signalsForTurn(artifacts, Number(state.selectedTurn));
      const coding = (artifacts.coding || []).find((item) => Number(item.turn) === Number(state.selectedTurn));
      $("readingStory").innerHTML = `
        <article class="story-lead">
          <h3>一文ごとに、何が観測されたかを見る</h3>
          <p>読解では、テキストを単なる発言ではなく、コード・関係グラフ・評価信号へ接続する観測単位として読みます。</p>
          <p class="story-thesis">今は T${escapeHtml(state.selectedTurn)} を見ています。コード ${escapeHtml((coding?.codes || []).length)}件、確認 ${escapeHtml(signals.coverage.length)}件、注意 ${escapeHtml(signals.warnings.length)}件。</p>
          ${selected ? `<p>${escapeHtml(argumentOf(selected)).slice(0, 120)}</p>` : ""}
          <ol class="story-script">
            <li>まず本文のどの箇所を見ているかを共有する。</li>
            <li>そこに付いたコード、確認、注意の数だけを説明する。</li>
            <li>必要ならコードブックか変化のビューへ進む。</li>
          </ol>
          <div class="story-actions">
            <button type="button" data-story-view="codebook">コードで見る</button>
            <button type="button" data-story-view="transition">変化で見る</button>
          </div>
        </article>
      `;
    }

    function renderSummary(batch, artifacts, caseInfo) {
      const messages = messagesOf(artifacts.episode);
      const coding = artifacts.coding || [];
      const world = artifacts.world || {};
      const harness = artifacts.harness || {};
      const coverage = artifacts.coverage || [];
      const transitions = transitionsOf(artifacts);
      const aggregate = batch.aggregate || {};
      const coverageCount = Array.isArray(artifacts.coverage)
        ? artifacts.coverage.length
        : (caseInfo?.coverage_signals ?? aggregate.total_coverage_signals ?? 0);
      const ungentleCount = Array.isArray(harness.ungentle_signals)
        ? harness.ungentle_signals.length
        : (caseInfo?.ungentle_signals ?? aggregate.total_ungentle_signals ?? 0);
      $("summary").innerHTML = [
        metric("ケース", caseInfo?.label || "-", ""),
        metric("テキスト", messages.length || artifacts.episode?.total_turns || 0, `コード ${coding.length}`),
        metric("関係グラフ", world.entities?.length || 0, `関係 ${world.relations?.length || 0} / 変化 ${transitions.length}`),
        metric("確認候補", coverageCount, "人が見る"),
        metric("働きかけ", pct(harness.positive_score ?? caseInfo?.positive_score ?? aggregate.average_positive_score), `注意 ${ungentleCount}`),
        metric("差分", caseInfo?.evaluation_disagreements ?? artifacts.diff?.disagreements?.length ?? "-", "評価差")
      ].join("");
    }

    function metric(label, value, hint) {
      return `<div class="metric"><div class="label">${escapeHtml(label)}</div><div class="value">${escapeHtml(value)}</div><div class="hint">${escapeHtml(hint)}</div></div>`;
    }

    function renderCases(batch) {
      const cases = batch.cases || [];
      $("caseList").innerHTML = cases.length ? cases.map((item) => `
        <button type="button" class="case-item ${item.case_id === state.selectedCaseId ? "active" : ""}" data-case="${escapeHtml(item.case_id)}">
          <div class="case-name">${escapeHtml(item.label || item.case_id)}</div>
          <div class="chips">
            ${(item.tags || []).slice(0, 4).map((tag) => `<span class="chip">${escapeHtml(jp("tag", tag))}</span>`).join("")}
            ${Number(item.coverage_signals || 0) > 0 ? `<span class="chip warn">確認 ${item.coverage_signals}</span>` : ""}
            ${Number(item.ungentle_signals || 0) > 0 ? `<span class="chip bad">注意 ${item.ungentle_signals}</span>` : ""}
            ${item.positive_score != null ? `<span class="chip good">${pct(item.positive_score)}</span>` : ""}
          </div>
        </button>
      `).join("") : `<div class="empty">表示できるケースがありません。</div>`;

      document.querySelectorAll(".case-item").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedCaseId = button.dataset.case;
          state.selectedTurn = 1;
          state.selectedCode = "";
          render();
        });
      });
    }

    function signalsForTurn(artifacts, turn) {
      const coverage = (artifacts.coverage || []).filter((item) => hasTurnEvidence(item, turn));
      const harness = artifacts.harness || {};
      const warnings = (harness.ungentle_signals || []).filter((item) => {
        if (hasTurnEvidence(item, turn)) return true;
        const text = `${item.signal_id || ""} ${item.reason || ""}`;
        return text.includes(`turn_${turn}`) || text.includes(`T${turn}`) || text.includes(`turn ${turn}`) || text.includes(`month${turn}`) || text.includes(`Month ${turn}`);
      });
      return { coverage, warnings };
    }

    function codeChipClass(code) {
      const warningCodes = new Set([
        "trauma_sensitivity",
        "double_bind",
        "institutional_access_gap",
        "daijoubu_cover",
        "self_censorship",
        "consent_vs_acceptance",
        "supporter_burden"
      ]);
      const watchCodes = new Set([
        "silence_detection",
        "asymmetry_visibility",
        "observability_drop",
        "missing_triadic_meeting",
        "decision_participation",
        "question_order_delay"
      ]);
      if (warningCodes.has(code)) return "bad";
      if (watchCodes.has(code)) return "warn";
      return "info";
    }

    function renderTimeline(artifacts) {
      const messages = messagesOf(artifacts.episode);
      const codingByTurn = new Map((artifacts.coding || []).map((item) => [Number(item.turn), item]));
      const transitions = transitionsOf(artifacts);
      $("turnCount").textContent = `${messages.length || 0}件`;
      $("timeline").innerHTML = messages.length ? messages.map((message, index) => {
        const turn = Number(message.turn || index + 1);
        const coding = codingByTurn.get(turn);
        const codes = coding?.codes || [];
        const signals = signalsForTurn(artifacts, turn);
        const transitionLinks = transitionsForTurn(transitions, turn);
        const signalClass = signals.warnings.length ? "has-warning" : signals.coverage.length ? "has-coverage" : "";
        return `
          <article class="turn ${turn === Number(state.selectedTurn) ? "selected" : ""} ${signalClass}" role="button" tabindex="0" data-turn="${turn}">
            <div class="turn-head">
              <span>T${turn} <span class="speaker">${escapeHtml(message.agent_name || coding?.agent_name || "不明")}</span></span>
              <span>${coding?.is_hypothesis ? "仮説" : `確信 ${pct(coding?.confidence)}`}</span>
            </div>
            <div class="utterance">${escapeHtml(argumentOf(message))}</div>
            <div class="chips">
              ${signals.coverage.length ? `<span class="chip warn">確認 ${signals.coverage.length}</span>` : ""}
              ${signals.warnings.length ? `<span class="chip bad">注意 ${signals.warnings.length}</span>` : ""}
              ${transitionLinks.slice(0, 2).map((item) => `<button type="button" class="chip good" data-turn-transition="${escapeHtml(item.id)}" title="${escapeHtml(item.label || item.id)}">変化</button>`).join("")}
              ${codes.length ? codes.map((code) => `<span class="chip ${codeChipClass(code)}" title="${escapeHtml(code)}">${escapeHtml(jp("code", code))}</span>`).join("") : `<span class="chip">コードなし</span>`}
            </div>
          </article>
        `;
      }).join("") : `<div class="empty">表示できるテキストがありません。</div>`;

      document.querySelectorAll(".turn[data-turn]").forEach((turnCard) => {
        const selectTurn = () => {
          state.selectedTurn = Number(turnCard.dataset.turn);
          renderTimeline(artifacts);
          renderTurnInspector(artifacts);
          renderTabs(artifacts);
        };
        turnCard.addEventListener("click", selectTurn);
        turnCard.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            selectTurn();
          }
        });
      });
      document.querySelectorAll("[data-turn-transition]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          state.selectedTransitionId = button.dataset.turnTransition;
          state.transitionModeFilter = "all";
          state.activeView = "transition";
          render();
        });
      });
    }

    function transitionsForTurn(transitions, turn) {
      return transitions.filter((item) => hasTurnEvidence(item, turn) || Number(item.from_turn) === Number(turn) || Number(item.to_turn) === Number(turn));
    }

    function buildCodebookSummary(artifacts) {
      const messages = messagesOf(artifacts.episode);
      const messageByTurn = new Map(messages.map((message, index) => [Number(message.turn || index + 1), message]));
      const map = new Map();
      for (const observation of artifacts.coding || []) {
        const turn = Number(observation.turn);
        for (const code of observation.codes || []) {
          if (!map.has(code)) {
            map.set(code, {
              code,
              label: jp("code", code),
              count: 0,
              turns: [],
              observations: [],
              cooccurs: new Map()
            });
          }
          const item = map.get(code);
          item.count += 1;
          item.turns.push(turn);
          item.observations.push({ ...observation, message: messageByTurn.get(turn) });
          for (const other of observation.codes || []) {
            if (other !== code) item.cooccurs.set(other, (item.cooccurs.get(other) || 0) + 1);
          }
        }
      }
      return [...map.values()].sort((a, b) => b.count - a.count || a.label.localeCompare(b.label, "ja"));
    }

    function renderCodebookView(artifacts) {
      const codes = buildCodebookSummary(artifacts);
      if (codes.length && !codes.some((item) => item.code === state.selectedCode)) {
        state.selectedCode = codes[0].code;
      }
      renderCodebookStory(codes.find((item) => item.code === state.selectedCode));
      $("codeCount").textContent = `${codes.length}件`;
      $("codeList").innerHTML = codes.length ? codes.map((item) => `
        <button type="button" class="code-item ${item.code === state.selectedCode ? "active" : ""}" data-code="${escapeHtml(item.code)}">
          <div class="code-name">${escapeHtml(item.label)}</div>
          <div class="chips">
            <span class="chip info">${item.count}例</span>
            ${[...item.cooccurs.entries()].slice(0, 3).map(([code]) => `<span class="chip">${escapeHtml(jp("code", code))}</span>`).join("")}
          </div>
        </button>
      `).join("") : `<div class="empty">このケースにはコードがありません。</div>`;

      document.querySelectorAll(".code-item[data-code]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedCode = button.dataset.code;
          renderCodebookView(artifacts);
        });
      });
      renderCodeDetail(artifacts, codes.find((item) => item.code === state.selectedCode));
    }

    function renderCodebookStory(selectedCode) {
      const def = selectedCode ? codeDefinitions[selectedCode.code] || {} : {};
      $("codebookStory").innerHTML = `
        <article class="story-lead">
          <h3>コードは、何を見るための言葉か</h3>
          <p>コードブックでは、名前を付けることよりも、観測したい現象・含める境界・除外する境界を確認します。</p>
          <p class="story-thesis">${escapeHtml(selectedCode?.label || "コード未選択")}: ${escapeHtml(def.summary || "定義を確認します。")}</p>
          <ol class="story-script">
            <li>このコードが何を観測する言葉かを読む。</li>
            <li>含める例と除外する例で、使いすぎを防ぐ。</li>
            <li>本文や変化に戻して、実例で確かめる。</li>
          </ol>
          <div class="story-actions">
            <button type="button" data-story-view="reading">本文に戻る</button>
            <button type="button" data-story-view="transition">変化で見る</button>
          </div>
        </article>
      `;
    }

    function codeWorldLinks(artifacts, turns) {
      const world = artifacts.world || {};
      const turnSet = new Set(turns.map(Number));
      const hasAnyTurn = (item) => (item.evidence_turns || []).some((turn) => turnSet.has(Number(turn)));
      const entityById = new Map((world.entities || []).map((entity) => [entity.id, entity.label]));
      const entityName = (id) => entityById.get(id) || id;
      return [
        ...(world.relations || []).filter(hasAnyTurn).map((item) => `関係: ${entityName(item.source)} → ${jp("predicate", item.predicate)} → ${entityName(item.target)}`),
        ...(world.states || []).filter(hasAnyTurn).map((item) => `状態: ${entityName(item.subject)} / ${jp("state_type", item.state_type)} / ${jp("value", item.value)}`),
        ...(world.norms || []).filter(hasAnyTurn).map((item) => `規範: ${item.label || item.id}`),
        ...(world.hypotheses || []).filter(hasAnyTurn).map((item) => `仮説: ${item.statement || item.id}`)
      ];
    }

    function codeTransitionLinks(artifacts, code, turns) {
      const turnSet = new Set(turns.map(Number));
      return transitionsOf(artifacts)
        .filter((item) => {
          if ((item.codes || []).includes(code)) return true;
          return (item.evidence_turns || []).some((turn) => turnSet.has(Number(turn)));
        })
        .map((item) => ({
          id: item.id,
          label: item.label || item.id,
          layer: jp("transition_layer", item.transition_layer) || "世界",
          type: jp("change_type", item.change_type) || item.change_type || "変化",
          direction: jp("direction", item.direction) || item.direction || "未確定",
          signals: fidelitySignalsOf(item).map((signal) => jp("fidelity_kind", signal.kind) || signal.kind || "信号")
        }));
    }

    function renderCodeDetail(artifacts, selectedCode) {
      if (!selectedCode) {
        $("selectedCodeChip").textContent = "-";
        $("codeDetail").innerHTML = `<div class="body-text">コードを選ぶと、定義・事例・関係グラフ接続がここに出ます。</div>`;
        $("codebookBottom").innerHTML = "";
        return;
      }
      const def = codeDefinitions[selectedCode.code] || {};
      const cooccurs = [...selectedCode.cooccurs.entries()].sort((a, b) => b[1] - a[1]);
      const worldLinks = codeWorldLinks(artifacts, selectedCode.turns);
      const transitionLinks = codeTransitionLinks(artifacts, selectedCode.code, selectedCode.turns);
      const turnSet = new Set(selectedCode.turns.map(Number));
      const coverage = (artifacts.coverage || []).filter((item) => (item.evidence_turns || []).some((turn) => turnSet.has(Number(turn))));
      $("selectedCodeChip").textContent = selectedCode.label;
      $("codeDetail").innerHTML = `
        <h3>${escapeHtml(selectedCode.label)}</h3>
        <div class="inspector-grid">
          ${inspectorBlock("定義", [def.summary || "定義は未設定です。"])}
          ${inspectorBlock("含める", def.include || ["未設定"])}
          ${inspectorBlock("除外・注意", [...(def.exclude || []), ...(def.risks || []).map((risk) => `注意: ${risk}`)])}
          ${inspectorBlock("関連概念", [...(def.concepts || []), ...cooccurs.slice(0, 4).map(([code, count]) => `${jp("code", code)} (${count})`)])}
        </div>
      `;
      $("codebookBottom").innerHTML = `
        <div class="panel-grid">
          <article class="card">
            <h3>事例</h3>
            <div class="mini-list">
              ${selectedCode.observations.map((item) => `<div><strong>T${item.turn}</strong> ${escapeHtml(argumentOf(item.message))}</div>`).join("")}
            </div>
          </article>
          <article class="card">
            <h3>関係グラフ接続</h3>
            <div class="mini-list">${worldLinks.length ? worldLinks.map((item) => `<div>${escapeHtml(item)}</div>`).join("") : "直接の接続なし"}</div>
          </article>
          <article class="card">
            <h3>関連する変化</h3>
            <div class="mini-list">${transitionLinks.length ? transitionLinks.map((item) => `
              <button type="button" class="code-item" data-code-transition="${escapeHtml(item.id)}">
                <strong>${escapeHtml(item.label)}</strong>
                <div class="chips">
                  <span class="chip">${escapeHtml(item.layer)}</span>
                  <span class="chip">${escapeHtml(item.type)}</span>
                  <span class="chip">${escapeHtml(item.direction)}</span>
                  ${item.signals.slice(0, 3).map((signal) => `<span class="chip info">${escapeHtml(signal)}</span>`).join("")}
                </div>
              </button>
            `).join("") : "直接の接続なし"}</div>
          </article>
          <article class="card">
            <h3>共起</h3>
            <div class="chips">${cooccurs.length ? cooccurs.map(([code, count]) => `<span class="chip">${escapeHtml(jp("code", code))} ${count}</span>`).join("") : `<span class="chip">なし</span>`}</div>
          </article>
          <article class="card">
            <h3>確認候補</h3>
            <div class="mini-list">${coverage.length ? coverage.map((item) => `<div>${escapeHtml(item.candidate_token || item.signal_id)}: 人が確認</div>`).join("") : "なし"}</div>
          </article>
        </div>
      `;
      document.querySelectorAll("[data-code-transition]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedTransitionId = button.dataset.codeTransition;

    function renderTransitionView(artifacts) {
      const transitions = transitionsOf(artifacts);
      const snapshots = snapshotsOf(artifacts);
      const diffs = worldDiffsOf(artifacts);
      renderDynamicStory(artifacts, transitions, snapshots, diffs);
      const modeSet = new Set(transitions.map(transitionModeOf));
      if (state.transitionModeFilter !== "all" && !modeSet.has(state.transitionModeFilter)) {
        state.transitionModeFilter = "all";
      }
      const visibleTransitions = state.transitionModeFilter === "all"
        ? transitions
        : transitions.filter((item) => transitionModeOf(item) === state.transitionModeFilter);
      if (visibleTransitions.length && !visibleTransitions.some((item) => item.id === state.selectedTransitionId)) {
        state.selectedTransitionId = visibleTransitions[0].id;
      }
      if (!visibleTransitions.length) {
        state.selectedTransitionId = "";
      }
      $("transitionCount").textContent = state.transitionModeFilter === "all" ? `${transitions.length}件` : `${visibleTransitions.length}/${transitions.length}件`;
      renderTransitionModeSummary(transitions);
      const messages = messagesOf(artifacts.episode);
      const turns = [...new Set([
        ...messages.map((message, index) => Number(message.turn || index + 1)),
        ...snapshots.map((snapshot) => Number(snapshot.turn)).filter(Number.isFinite)

      $("transitionStepCount").textContent = `${turns.length}時点`;
      $("transitionLane").innerHTML = turns.length ? turns.map((turn) => {
        const related = transitions.filter((item) => hasTurnEvidence(item, turn) || Number(item.from_turn) === turn || Number(item.to_turn) === turn);
        const snapshot = snapshots.find((item) => Number(item.turn) === Number(turn));
        const diff = diffs.find((item) => item.to_snapshot_id === snapshot?.snapshot_id || Number(snapshotTurnFromId(item.to_snapshot_id)) === Number(turn));
        const message = messages.find((item, index) => Number(item.turn || index + 1) === turn);
        return `
          <article class="transition-step ${Number(state.selectedTurn) === Number(turn) ? "selected" : ""}" role="button" tabindex="0" data-transition-turn="${escapeHtml(turn)}" data-transition-at-turn="${escapeHtml(related[0]?.id || "")}">

            <div>

              <div class="chips">${related.map((item) => `<span class="chip ${transitionLayerClass(item.transition_layer)}">${escapeHtml(jp("transition_layer", item.transition_layer) || "世界")}</span>`).join("")}</div>
              ${snapshot ? `<div class="chips"><span class="chip info">世界 ${escapeHtml(snapshot.phase || "snapshot")}</span><span class="chip">要素 ${escapeHtml(snapshot.entity_ids?.length || 0)}</span><span class="chip">根拠 ${escapeHtml(snapshot.evidence_turns?.length || 0)}</span></div>` : ""}
              ${diff ? `<div class="body-text">${escapeHtml(diff.summary || "差分あり")}</div>` : ""}
            </div>
          </article>
        `;
      }).join("") : `<div class="empty">表示できる時系列がありません。</div>`;

      $("transitionList").innerHTML = visibleTransitions.length ? visibleTransitions.map((item) => `
        <button type="button" class="transition-card ${item.id === state.selectedTransitionId ? "selected" : ""}" data-transition="${escapeHtml(item.id)}">
          <h3>${escapeHtml(item.label || item.id)} <span class="chip info">T${escapeHtml(item.from_turn ?? "?")} -> T${escapeHtml(item.to_turn ?? "?")}</span></h3>
          <div class="chips">
            <span class="chip ${transitionLayerClass(item.transition_layer)}">${escapeHtml(jp("transition_layer", item.transition_layer) || "世界")}</span>
            <span class="chip info">${escapeHtml(cascadeEventLabel(item))}</span>
            <span class="chip">${escapeHtml(jp("change_type", item.change_type) || item.change_type || "変化")}</span>
            <span class="chip ${transitionDirectionClass(item.direction)}">${escapeHtml(jp("direction", item.direction) || item.direction || "未確定")}</span>
            <span class="chip ${transitionModeClass(transitionModeOf(item))}">${escapeHtml(jp("transition_mode", transitionModeOf(item)) || transitionModeOf(item))}</span>
            ${fidelitySignalsOf(item).slice(0, 3).map((signal) => `<span class="chip ${fidelitySignalClass(signal)}">${escapeHtml(jp("fidelity_kind", signal.kind) || signal.kind || "信号")}</span>`).join("")}
          </div>
          <div class="body-text">${escapeHtml(item.signal || "")}</div>
          <div class="transition-card-note">${escapeHtml(transitionCardNoteOf(item))}</div>
        </button>
      `).join("") : `<div class="empty">表示できる変化はありません。</div>`;

      document.querySelectorAll(".transition-card[data-transition]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedTransitionId = button.dataset.transition;
          renderTransitionView(artifacts);
        });
      });
      document.querySelectorAll("[data-transition-turn]").forEach((step) => {
        const selectStep = () => {
          state.selectedTurn = Number(step.dataset.transitionTurn);
          if (step.dataset.transitionAtTurn) {
            state.selectedTransitionId = step.dataset.transitionAtTurn;
            state.transitionModeFilter = "all";

        step.addEventListener("click", selectStep);
        step.addEventListener("keydown", (event) => {

    function renderTransitionModeSummary(transitions) {
      const counts = transitions.reduce((acc, transition) => {
        const mode = transitionModeOf(transition);
        acc.set(mode, (acc.get(mode) || 0) + 1);
        return acc;
      }, new Map());
      const modeButtons = counts.size ? [...counts.entries()]
        .sort((a, b) => b[1] - a[1])
        .map(([mode, count]) => `<button type="button" class="chip ${transitionModeClass(mode)} ${state.transitionModeFilter === mode ? "active" : ""}" data-transition-mode-filter="${escapeHtml(mode)}">${escapeHtml(jp("transition_mode", mode) || mode)} ${escapeHtml(count)}件</button>`)
        .join("") : `<span class="chip">変化なし</span>`;
      const status = state.transitionModeFilter === "all"
        ? "表示: すべての変化"
        : `表示: ${jp("transition_mode", state.transitionModeFilter) || state.transitionModeFilter} の変化だけ`;
      $("transitionModeSummary").innerHTML = counts.size
        ? `<button type="button" class="chip ${state.transitionModeFilter === "all" ? "active" : ""}" data-transition-mode-filter="all">すべて ${escapeHtml(transitions.length)}件</button>${modeButtons}<div class="transition-mode-status">${escapeHtml(status)}</div>${seciSpiralSummary(transitions)}`

    function dynamicStoryOf(artifacts, transitions, snapshots, diffs) {
      const messages = messagesOf(artifacts.episode);
      const modes = transitions.reduce((acc, transition) => {
        const mode = transitionModeOf(transition);
        acc[mode] = (acc[mode] || 0) + 1;
        return acc;
      }, {});
      const dominantMode = Object.entries(modes).sort((a, b) => b[1] - a[1])[0]?.[0];
      const fidelitySignals = transitions.flatMap((transition) => fidelitySignalsOf(transition));
      const cautionSignals = fidelitySignals.filter((signal) => signal.polarity === "negative" || signal.polarity === "caution" || signal.polarity === "warning" || signal.polarity === "weak");
      const positiveSignals = fidelitySignals.filter((signal) => signal.polarity === "positive" || signal.polarity === "strong" || signal.polarity === "emerging");
      const world = artifacts.world || {};
      const worldCount = snapshots.length
        ? `${snapshots.length}枚 / 差分${diffs.length || 0}`
        : `関係${world.relations?.length || 0} / 変化${transitions.length || 0}`;
      const worldText = snapshots.length
        ? "スナップショットと差分で、関係・状態・語彙がどのように増えたかを見ます。"
        : "まず関係グラフと変化から、状況理解がどのように更新されたかを見ます。";
      const modeLabel = dominantMode ? jp("transition_mode", dominantMode) || dominantMode : "変化";
      const nextAction = nextDynamicActionOf(dominantMode, positiveSignals.length, cautionSignals.length);
      return {
        title: "時間の中で、何が変わったかを見る",
        lead: "動的モデリングでは、発言や出来事を点で見ず、世界モデル・コード・評価信号がどう移り変わるかを追います。",
        thesis: "このケースでは、三者が揃っているかだけでなく、非対称性を調整し続けるプロセスとして読めるかを見ます。",
        eventCount: `${messages.length || 0}時点`,
        eventText: "左から順に、出来事と発言の流れを見ます。どの時点で変化が起きたかを確認します。",
        worldCount,
        worldText,
        signalCount: `${fidelitySignals.length || 0}信号`,
        signalText: `${modeLabel}を中心に、よい兆し${positiveSignals.length}件、注意${cautionSignals.length}件を確認します。`,
        actionLabel: nextAction.label,
        actionText: nextAction.text
      };
    }

    function nextDynamicActionOf(mode, positiveCount, cautionCount) {
      if (mode === "precursor_missed" || mode === "missed_precursor") {
        return {
          label: "予兆を戻る",
          text: "注意信号が出る前の時点に戻り、どの観測や支援が抜けていたかを確認します。"
        };
      }
      if (mode === "aftercare_repair") {
        return {
          label: "前倒しする",
          text: "事後対処として現れた働きかけを、より早い常時調整に移せないか検討します。"
        };
      }
      if (mode === "continuous_adjustment" || mode === "preventive_process") {
        return {
          label: "維持する",
          text: "細かな再調整が続いている場面を、支援方法やコードブックに戻して再利用します。"
        };
      }
      if (mode === "schema_refinement") {
        return {
          label: "語彙を更新",
          text: "見えた変化をコードブックや評価語彙へ戻し、次の読み解きの精度を上げます。"
        };
      }
      if (cautionCount > positiveCount) {
        return {
          label: "確認する",
          text: "注意信号の根拠を確認し、支援・観測・語彙のどこを直すべきかを切り分けます。"
        };
      }
      return {
        label: "次へつなぐ",
        text: "よい兆しがどの条件で生まれたかを確認し、次のケースや実践に接続します。"
      };
    }

    function seciCaseAnnotationSeeds() {
      return dynamicCodingSeedRegistry().filter((seed) => seed?.kind === "case_annotation_seed" || (seed?.annotations || []).length);
    }

    function embeddedDynamicCodingSeedRegistry() {
      return [
        seciMatsuiTrinityAnnotationSeed(),
        seciP1TwelveMonthAnnotationSeed()
      ];
    }

    function dynamicCodingSeedRegistry() {
      const external = Array.isArray(window.MEOWFELIS_DYNAMIC_CODING_SEEDS)
        ? window.MEOWFELIS_DYNAMIC_CODING_SEEDS
        : [];
      return external.length ? external.map(normalizeDynamicCodingSeed) : embeddedDynamicCodingSeedRegistry();
    }

    function normalizeDynamicCodingSeed(seed) {
      return {
        source: "external_seed_registry",
        ...seed,
        annotations: Array.isArray(seed?.annotations) ? seed.annotations : []
      };
    }

    function dynamicCodingSeedRegistryStatus() {
      const externalCount = Array.isArray(window.MEOWFELIS_DYNAMIC_CODING_SEEDS)
        ? window.MEOWFELIS_DYNAMIC_CODING_SEEDS.length
        : 0;
      const seeds = dynamicCodingSeedRegistry();
      const embedded = embeddedDynamicCodingSeedRegistry();
      const annotations = seeds.reduce((sum, seed) => sum + (seed.annotations || []).length, 0);
      const embeddedAnnotations = embedded.reduce((sum, seed) => sum + (seed.annotations || []).length, 0);
      const externalIds = seeds.map((seed) => seed.schema_id).filter(Boolean).sort().join("|");
      const embeddedIds = embedded.map((seed) => seed.schema_id).filter(Boolean).sort().join("|");
      return {
        source: externalCount ? (window.MEOWFELIS_DYNAMIC_CODING_SEED_SOURCE || "external_seed_registry") : "embedded_fallback",
        seedCount: seeds.length,
        annotationCount: annotations,
        fallbackSeedCount: embedded.length,
        fallbackAnnotationCount: embeddedAnnotations,
        fallbackMatch: seeds.length === embedded.length && annotations === embeddedAnnotations && externalIds === embeddedIds,
        fallbackDiffLabel: dynamicCodingSeedFallbackDiffLabel(seeds, embedded, externalCount)
      };
    }

    function dynamicCodingSeedFallbackDiffLabel(seeds, embedded, externalCount) {
      if (!externalCount) return "fallbackのみ";
      const schemaDiffCount = symmetricDiffCount(
        seeds.map((seed) => seed.schema_id).filter(Boolean),
        embedded.map((seed) => seed.schema_id).filter(Boolean)
      );
      const annotationDiffCount = symmetricDiffCount(seedAnnotationIds(seeds), seedAnnotationIds(embedded));
      if (schemaDiffCount === 0 && annotationDiffCount === 0) return "差分なし";
      return `schema差分 ${schemaDiffCount} / annotation差分 ${annotationDiffCount}`;
    }

    function seedAnnotationIds(seeds) {
      return seeds.flatMap((seed) => (seed.annotations || []).map((annotation) =>
        `${seed.schema_id || "seed"}:${annotation.annotation_id || annotation.turn || JSON.stringify(annotation)}`
      ));
    }

    function symmetricDiffCount(left, right) {
      const leftSet = new Set(left);
      const rightSet = new Set(right);
      let count = 0;
      for (const item of leftSet) if (!rightSet.has(item)) count += 1;
      for (const item of rightSet) if (!leftSet.has(item)) count += 1;
      return count;
    }

    function seciModeLabel(mode) {
      return {
        socialization: "共同化",
        externalization: "表出化",
        combination: "連結化",
        internalization: "内面化"
      }[mode] || mode;
    }

    function seciAnnotationForTransition(transition) {
      const transitionId = transition?.id || "";
      return seciCaseAnnotationSeeds()
        .flatMap((seed) => (seed.annotations || []).map((annotation) => ({
          ...annotation,
          schema_id: seed.schema_id,
          schema_ref: seed.schema_ref,
          seed_ref: seed.seed_ref,
          seed_source: seed.source
        })))
        .find((annotation) => annotation.transition_id === transitionId) || null;
    }

    function seciAnnotationBlock(transition) {
      const annotation = seciAnnotationForTransition(transition);
      if (!annotation) return "";
      const modes = (annotation.seci_modes || []).map(seciModeLabel).join(" + ") || "未分類";
      return inspectorBlock("SECIレンズ", [
        `モード: ${modes}`,
        `場: ${annotation.ba || "未記録"}`,
        `読み取り: ${annotation.reading || "未記録"}`,
        `反証レンズ: ${seciCounterLensLabels(annotation).join(" / ") || "未分類"}`,
        `seed: ${annotation.seed_ref || annotation.schema_id || "embedded"}`,
        `注意: ${(annotation.risks || []).join(" / ") || "未記録"}`
      ]);
    }

    function seciSpiralSummary(transitions) {
      const annotated = (transitions || [])
        .map((transition) => seciAnnotationForTransition(transition))
        .filter(Boolean);
      if (!annotated.length) return "";
      const sequence = annotated
        .map((annotation) => (annotation.seci_modes || []).map(seciModeLabel).join("+") || "未分類")
        .join(" -> ");
      const risks = annotated.flatMap((annotation) => annotation.risks || []);
      const counter = seciCounterLensSummary(annotated);
      const registry = dynamicCodingSeedRegistryStatus();
      return `<div class="transition-mode-status">SECI連鎖: ${escapeHtml(sequence)} / 注意 ${escapeHtml(risks.length)}件${counter ? ` / 反証: ${escapeHtml(counter)}` : ""} / seed ${escapeHtml(registry.source)}</div>`;
    }

    function seciCaseComparisonCards() {
      const cases = normalizeBatch(state.batch).cases || [];
      const cards = cases
        .map((caseInfo) => {
          const artifacts = state.artifactsByCase[caseInfo.case_id] || {};
          const transitions = transitionsOf(artifacts);
          const annotated = transitions
            .map((transition) => seciAnnotationForTransition(transition))
            .filter(Boolean);
          if (!annotated.length) return "";
          const modes = annotated
            .map((annotation) => (annotation.seci_modes || []).map(seciModeLabel).join("+") || "未分類")
            .join(" -> ");
          const riskCount = annotated.flatMap((annotation) => annotation.risks || []).length;
          const active = caseInfo.case_id === state.selectedCaseId ? " / 表示中" : "";
          return `
            <article class="story-card">
              <h3>SECI比較${escapeHtml(active)}</h3>
              <strong>${escapeHtml(caseInfo.label || caseInfo.case_id)}</strong>
              <p>${escapeHtml(modes)} / 注意 ${escapeHtml(riskCount)}件</p>
            </article>
          `;
        })
        .filter(Boolean);
      return cards.length ? cards.join("") : "";
    }

    function seciCounterLensLabels(annotation) {
      if (annotation?.counter_lenses?.length) return annotation.counter_lenses;
      const text = (annotation.risks || []).join(" ");
      const labels = [];
      if (/過大評価|十分な動的フィデリティ|成功/.test(text)) labels.push("成功物語化");
      if (/本人|声|lived experience|実感/.test(text)) labels.push("本人不在");
      if (/内面化|実践|日常調整|書かれただけ/.test(text)) labels.push("内面化の誤認");
      if (/権限|制度|力関係|非対称/.test(text)) labels.push("構造不変");
      if (/沈黙|観測低下|共有/.test(text)) labels.push("共有不全");
      return [...new Set(labels)];
    }

    function seciCounterLensSummary(annotations) {
      const labels = annotations.flatMap(seciCounterLensLabels);
      return [...new Set(labels)].join(" / ");
    }

    function renderTransitionDetail(artifacts, selected) {
      if (!selected) {
        $("selectedTransitionChip").textContent = "-";
        $("transitionDetail").innerHTML = `<div class="body-text">変化を選ぶと、前後、読み取り、接続コードがここに出ます。</div>`;
        return;
      }
      const entityById = new Map((artifacts.world?.entities || []).map((entity) => [entity.id, entity.label]));
      const entityName = (id) => entityById.get(id) || id || "-";
      const fidelitySignals = fidelitySignalsOf(selected);
      const snapshot = snapshotForTransition(artifacts, selected);
      const diff = diffForTransition(artifacts, selected, snapshot);
      const selectedTurnSnapshot = snapshotForTurn(artifacts, state.selectedTurn);
      const selectedTurnDiff = diffForTurn(artifacts, state.selectedTurn, selectedTurnSnapshot);
      const snapshotComparison = snapshotComparisonSummary(artifacts, diff);
      const snapshotInterpretation = snapshotInterpretationSummary(artifacts, diff);
      const mechanism = mechanismOf(selected);
      const evidenceRefs = evidenceRefsOf(artifacts, selected);
      const diffEvidenceRefs = snapshotDiffEvidenceRefsOf(artifacts, diff, selected);
      const evidenceTurns = transitionEvidenceTurnsOf(selected);
